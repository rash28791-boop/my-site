<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>AI Бот · Диалог</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
        }

        .bg-animated {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            background: #0a0a14;
            overflow: hidden;
        }

        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            animation: orbFloat 20s ease-in-out infinite;
        }

        .bg-orb:nth-child(1) {
            width: 300px;
            height: 300px;
            background: rgba(0, 180, 255, 0.15);
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }

        .bg-orb:nth-child(2) {
            width: 250px;
            height: 250px;
            background: rgba(123, 47, 255, 0.12);
            bottom: -50px;
            right: -50px;
            animation-delay: -7s;
        }

        .bg-orb:nth-child(3) {
            width: 200px;
            height: 200px;
            background: rgba(0, 200, 200, 0.1);
            top: 50%;
            left: 50%;
            animation-delay: -14s;
        }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(100px, -50px) scale(1.2); }
            50% { transform: translate(50px, 100px) scale(0.9); }
            75% { transform: translate(-80px, 30px) scale(1.1); }
        }

        .phone-frame {
            width: 100vw;
            height: 100vh;
            height: -webkit-fill-available;
            max-width: 100%;
            max-height: 100%;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            z-index: 1;
            background: transparent;
        }

        .lock-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
            color: white;
            will-change: transform, opacity;
            background: rgba(10, 10, 25, 0.88);
            backdrop-filter: blur(60px) saturate(220%);
            -webkit-backdrop-filter: blur(60px) saturate(220%);
        }

        .lock-screen.unlocked {
            transform: translateY(-110%);
            opacity: 0;
            pointer-events: none;
        }

        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            z-index: 0;
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            filter: blur(1.5px);
            animation: floatUp var(--duration) linear infinite;
            animation-delay: var(--delay);
            will-change: transform, opacity;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(105vh) scale(0); opacity: 0; }
            15% { opacity: var(--max-opacity); }
            50% { opacity: calc(var(--max-opacity) * 0.6); }
            85% { opacity: calc(var(--max-opacity) * 0.2); }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .lock-content {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 320px;
        }

        .lock-icon {
            font-size: 90px;
            margin-bottom: 20px;
            filter: drop-shadow(0 15px 40px rgba(0, 180, 255, 0.8));
            animation: lockPulse 3s ease-in-out infinite;
        }

        @keyframes lockPulse {
            0%, 100% { transform: scale(1) rotate(0deg); filter: drop-shadow(0 15px 40px rgba(0, 180, 255, 0.6)); }
            50% { transform: scale(1.08) rotate(5deg); filter: drop-shadow(0 20px 50px rgba(123, 47, 255, 0.9)); }
        }

        .lock-icon.shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 90% { transform: translateX(-10px); }
            20%, 80% { transform: translateX(10px); }
            30%, 50%, 70% { transform: translateX(-6px); }
            40%, 60% { transform: translateX(6px); }
        }

        .lock-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00b4ff 0%, #7b2fff 50%, #ff2d95 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            animation: titleShine 4s ease-in-out infinite;
        }

        @keyframes titleShine {
            0%, 100% { filter: brightness(1); }
            50% { filter: brightness(1.3); }
        }

        .lock-subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 45px;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-align: center;
        }

        .password-input {
            background: rgba(255, 255, 255, 0.06);
            border: 2px solid rgba(0, 180, 255, 0.25);
            border-radius: 18px;
            padding: 18px;
            font-size: 24px;
            width: 100%;
            text-align: center;
            color: white;
            outline: none;
            letter-spacing: 8px;
            caret-color: #00b4ff;
            transition: all 0.3s ease;
            margin-bottom: 28px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.3);
        }

        .password-input:focus {
            border-color: rgba(0, 180, 255, 0.7);
            background: rgba(255, 255, 255, 0.12);
            box-shadow: 0 0 50px rgba(0, 180, 255, 0.3), inset 0 2px 10px rgba(0, 0, 0, 0.2);
            transform: scale(1.02);
        }

        .password-input.error {
            border-color: rgba(255, 69, 58, 0.7);
            animation: errorPulse 0.5s ease;
        }

        @keyframes errorPulse {
            0%, 100% { transform: scale(1); }
            30% { transform: scale(1.05); }
            60% { transform: scale(0.97); }
        }

        .password-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 4px;
            font-size: 16px;
        }

        .unlock-btn {
            background: linear-gradient(135deg, #00b4ff, #7b2fff);
            border: none;
            padding: 18px 50px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 700;
            color: white;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            box-shadow: 0 12px 40px rgba(0, 180, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 3px;
            width: 100%;
            max-width: 260px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
        }

        .unlock-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(45deg);
            animation: btnShine 3s infinite;
        }

        @keyframes btnShine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .unlock-btn:active {
            transform: scale(0.94);
            box-shadow: 0 6px 25px rgba(0, 180, 255, 0.4);
        }

        .unlock-btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .app-screen {
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
            background: transparent;
        }

        .chat-header {
            padding: env(safe-area-inset-top, 12px) 16px 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-weight: 600;
            font-size: 19px;
            z-index: 5;
            min-height: 56px;
            background: rgba(15, 15, 30, 0.7);
            backdrop-filter: blur(60px) saturate(220%);
            -webkit-backdrop-filter: blur(60px) saturate(220%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.3s ease;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s ease;
            color: rgba(255, 255, 255, 0.85);
            flex-shrink: 0;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .icon-btn:active {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(0.88);
        }

        .chat-title {
            font-weight: 700;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #00b4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-size: 18px;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            background: transparent;
            scroll-behavior: smooth;
        }

        .messages-container::-webkit-scrollbar {
            width: 3px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        .message-bubble {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 22px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
            overflow-wrap: break-word;
            color: #fff;
            align-self: flex-start;
            animation: messageSlideIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            white-space: pre-wrap;
            position: relative;
        }

        @keyframes messageSlideIn {
            from { opacity: 0; transform: translateY(15px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .message-bubble.sent {
            background: linear-gradient(135deg, rgba(0, 180, 255, 0.3), rgba(123, 47, 255, 0.3));
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            color: white;
            align-self: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-bottom-right-radius: 6px;
        }

        .message-bubble.system {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: rgba(255, 255, 255, 0.45);
            align-self: center;
            font-style: italic;
            font-size: 12px;
            border-radius: 14px;
            padding: 6px 14px;
            border: none;
            max-width: 85%;
        }

        .message-bubble.ai {
            background: rgba(0, 200, 150, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(0, 200, 150, 0.2);
            border-bottom-left-radius: 6px;
        }

        .message-bubble.loading {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 4px;
            text-align: right;
        }

        .typing-indicator {
            display: flex;
            gap: 5px;
            padding: 6px 0;
        }

        .typing-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            animation: typingBounce 1.4s infinite;
        }

        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-8px); opacity: 1; }
        }

        .message-image {
            max-width: 220px;
            max-height: 220px;
            border-radius: 16px;
            margin-bottom: 6px;
            cursor: pointer;
            border: 2px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
            object-fit: cover;
        }

        .message-image:active {
            transform: scale(0.95);
            border-color: rgba(0, 180, 255, 0.6);
        }

        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .image-viewer.open {
            opacity: 1;
            pointer-events: all;
        }

        .image-viewer img {
            max-width: 95%;
            max-height: 85vh;
            border-radius: 12px;
            object-fit: contain;
        }

        .image-viewer-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
        }

        .image-caption {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
            font-style: italic;
        }

        .input-area {
            display: flex;
            padding: 10px 12px;
            padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
            gap: 8px;
            align-items: center;
            z-index: 5;
            min-height: 60px;
            background: rgba(15, 15, 30, 0.7);
            backdrop-filter: blur(60px) saturate(220%);
            -webkit-backdrop-filter: blur(60px) saturate(220%);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .attach-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: #00b4ff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            flex-shrink: 0;
        }

        .attach-btn:active {
            transform: scale(0.85) rotate(90deg);
            background: rgba(0, 180, 255, 0.2);
        }

        .message-input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            font-size: 15px;
            outline: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            transition: all 0.2s ease;
            min-width: 0;
        }

        .message-input:focus {
            border-color: rgba(0, 180, 255, 0.5);
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 180, 255, 0.15);
        }

        .message-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-btn {
            background: linear-gradient(135deg, #00b4ff, #7b2fff);
            border: none;
            color: white;
            font-size: 15px;
            font-weight: 600;
            padding: 12px 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: 0 4px 20px rgba(0, 180, 255, 0.35);
        }

        .send-btn:active {
            transform: scale(0.92);
        }

        .send-btn:disabled {
            opacity: 0.4;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 12;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s ease;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .overlay.visible {
            opacity: 1;
            pointer-events: all;
        }

        .settings-modal {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
            padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
            box-shadow: 0 -20px 60px rgba(0, 0, 0, 0.6);
            z-index: 30;
            transform: translateY(100%);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-height: 85vh;
            overflow-y: auto;
            background: rgba(20, 20, 40, 0.92);
            backdrop-filter: blur(60px) saturate(220%);
            -webkit-backdrop-filter: blur(60px) saturate(220%);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .settings-modal.open {
            transform: translateY(0);
        }

        .settings-handle {
            width: 40px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
            align-self: center;
            margin-bottom: 8px;
        }

        .settings-title {
            font-size: 22px;
            font-weight: 700;
            text-align: center;
            background: linear-gradient(135deg, #00b4ff, #7b2fff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .settings-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .settings-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.4);
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .theme-btn {
            padding: 14px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.04);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s ease;
            font-size: 15px;
            color: #fff;
            text-align: center;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        .theme-btn:active {
            transform: scale(0.94);
        }

        .theme-btn.active {
            background: linear-gradient(135deg, #00b4ff, #7b2fff);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 25px rgba(0, 180, 255, 0.4);
        }

        .toggle-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .toggle-label {
            font-size: 15px;
            font-weight: 500;
        }

        .toggle-switch {
            position: relative;
            width: 52px;
            height: 30px;
            flex-shrink: 0;
        }

        .toggle-switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .toggle-slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.15);
            transition: 0.3s;
            border-radius: 30px;
        }

        .toggle-slider:before {
            position: absolute;
            content: "";
            height: 24px;
            width: 24px;
            left: 3px;
            bottom: 3px;
            background: white;
            transition: 0.3s;
            border-radius: 50%;
        }

        input:checked + .toggle-slider {
            background: linear-gradient(135deg, #00b4ff, #7b2fff);
        }

        input:checked + .toggle-slider:before {
            transform: translateX(22px);
        }

        .close-settings {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 16px;
            border-radius: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            transition: all 0.2s ease;
            font-size: 16px;
            text-align: center;
            margin-top: 8px;
        }

        .close-settings:active {
            background: rgba(255, 255, 255, 0.15);
            transform: scale(0.97);
        }

        .toast {
            position: absolute;
            top: calc(env(safe-area-inset-top, 20px) + 50px);
            left: 50%;
            transform: translateX(-50%) translateY(-120px);
            background: rgba(0, 0, 0, 0.9);

    <script>
        (function() {
            'use strict';

            var CORRECT_PASSWORD = '1394';
            var WIKIPEDIA_API = 'https://ru.wikipedia.org/w/api.php';
            var DUCKDUCKGO_API = 'https://api.duckduckgo.com/';
            var STORAGE_KEY = 'aiBotSettingsV5';
            var MEMORY_KEY = 'aiMemoryV5';
            var FACTS_KEY = 'aiFactsV5';
            var MAX_MEMORY = 100;
            var MAX_STORAGE_MEMORY = 50;
            var THINK_MIN = 600;
            var THINK_MAX = 2000;
            var IMAGE_MAX_SIZE = 30 * 1024 * 1024;

            var lockScreen = document.getElementById('lockScreen');
            var lockIcon = document.getElementById('lockIcon');
            var passwordInput = document.getElementById('passwordInput');
            var unlockBtn = document.getElementById('unlockBtn');
            var lockChatBtn = document.getElementById('lockChatBtn');
            var memoryBtn = document.getElementById('memoryBtn');
            var clearChatBtn = document.getElementById('clearChatBtn');
            var settingsIcon = document.getElementById('settingsIcon');
            var settingsModal = document.getElementById('settingsModal');
            var settingsOverlay = document.getElementById('settingsOverlay');
            var closeSettingsBtn = document.getElementById('closeSettingsBtn');
            var messageInput = document.getElementById('messageInput');
            var sendBtn = document.getElementById('sendBtn');
            var messagesContainer = document.getElementById('messagesContainer');
            var phoneFrame = document.getElementById('phoneFrame');
            var particlesContainer = document.getElementById('particlesContainer');
            var themeButtons = document.querySelectorAll('.theme-btn');
            var toast = document.getElementById('toast');
            var searchToggle = document.getElementById('searchToggle');
            var memoryToggle = document.getElementById('memoryToggle');
            var visionToggle = document.getElementById('visionToggle');
            var attachBtn = document.getElementById('attachBtn');
            var fileInput = document.getElementById('fileInput');
            var imageViewer = document.getElementById('imageViewer');
            var imageViewerImg = document.getElementById('imageViewerImg');
            var imageViewerClose = document.getElementById('imageViewerClose');

            var isLocked = true;
            var isProcessingUnlock = false;
            var isProcessingMessage = false;
            var isDestroyed = false;
            var particles = [];
            var toastTimer;
            var thinkingTimer = null;
            var conversationMemory = [];
            var userFacts = [];

            var settings = {
                theme: 'dark',
                searchEnabled: true,
                memoryEnabled: true,
                visionEnabled: true
            };

            var knowledgeBase = {
                'привет': 'Привет! Рад тебя видеть! Чем могу помочь?',
                'здравствуй': 'Здравствуй! Задавай любой вопрос.',
                'добрый день': 'Добрый день! Как твои дела?',
                'доброе утро': 'Доброе утро! Прекрасный день!',
                'добрый вечер': 'Добрый вечер! Как прошёл день?',
                'hello': 'Hello! How can I help you?',
                'hi': 'Hi there! What can I do for you?',
                'как дела': 'У меня всё отлично! А как твои дела?',
                'что ты умеешь': '🌟 МОИ ВОЗМОЖНОСТИ:\n\n🔍 Поиск в интернете\n🖼️ Анализ фото\n🧠 Память диалога\n🧮 Решение примеров\n📚 База знаний\n💡 Логические рассуждения\n\nЧто интересует?',
                'кто ты': 'Я AI-бот с доступом к интернету, распознаванием фото и памятью диалога.',
                'расскажи о себе': 'Я AI-бот. Могу искать информацию, анализировать фото, решать примеры и помнить контекст.',
                'пока': 'До встречи! 😊',
                'до свидания': 'До свидания! Возвращайся!',
                'спасибо': 'Всегда пожалуйста! 🤗',
                'благодарю': 'Не за что! Обращайся.',
                'помоги': 'Конечно! Расскажи подробнее, с чем нужна помощь.',
                'объясни': 'С удовольствием объясню! Уточни тему.',
                'столица россии': 'Столица России — Москва! 🏛️\nНаселение: 13+ млн\nОснована: 1147 год',
                'земля': 'Земля — третья планета от Солнца! 🌍\nДиаметр: 12 742 км\nВозраст: 4,54 млрд лет',
                'солнце': 'Солнце — звезда в центре системы! ☀️\nТемпература ядра: 15 млн °C\nРасстояние: 150 млн км',
                'луна': 'Луна — спутник Земли! 🌙\nРасстояние: 384 400 км\nДиаметр: 3 474 км',
            };

            function padNumber(num) {
                return num < 10 ? '0' + num : '' + num;
            }

            function isInteger(num) {
                return typeof num === 'number' && isFinite(num) && Math.floor(num) === num;
            }

            function safeSetTimeout(callback, delay) {
                if (isDestroyed) return null;
                return setTimeout(function() {
                    if (!isDestroyed) {
                        callback();
                    }
                }, delay);
            }

            function think(callback, minDelay, maxDelay) {
                if (isDestroyed) return;
                minDelay = minDelay || THINK_MIN;
                maxDelay = maxDelay || THINK_MAX;
                var delay = minDelay + Math.random() * (maxDelay - minDelay);
                clearTimeout(thinkingTimer);
                thinkingTimer = safeSetTimeout(callback, delay);
            }

            function showToast(message, duration) {
                if (isDestroyed) return;
                duration = duration || 2000;
                if (!toast) return;
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toastTimer);
                toastTimer = safeSetTimeout(function() {
                    if (toast) toast.classList.remove('show');
                }, duration);
            }

            function finishProcessing() {
                if (isDestroyed) return;
                isProcessingMessage = false;
                if (sendBtn) sendBtn.disabled = false;
                if (messageInput) messageInput.focus();
                saveMemory();
            }

            function saveMemory() {
                if (isDestroyed || !settings.memoryEnabled) return;
                try {
                    localStorage.setItem(MEMORY_KEY, JSON.stringify(conversationMemory.slice(-MAX_STORAGE_MEMORY)));
                    localStorage.setItem(FACTS_KEY, JSON.stringify(userFacts));
                } catch (e) {}
            }

            function createParticles() {
                if (isDestroyed || !particlesContainer) return;
                var fragment = document.createDocumentFragment();
                var colors = [
                    'rgba(0, 180, 255, 0.5)',
                    'rgba(123, 47, 255, 0.4)',
                    'rgba(0, 200, 255, 0.3)',
                    'rgba(255, 45, 149, 0.3)'
                ];

                for (var i = 0; i < 22; i++) {
                    var particle = document.createElement('div');
                    particle.classList.add('particle');
                    var size = 2 + Math.random() * 5;
                    particle.style.width = size + 'px';
                    particle.style.height = size + 'px';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.setProperty('--duration', (5 + Math.random() * 7) + 's');
                    particle.style.setProperty('--delay', Math.random() * 7 + 's');
                    particle.style.setProperty('--max-opacity', String(0.3 + Math.random() * 0.5));
                    particle.style.background = colors[Math.floor(Math.random() * colors.length)];
                    fragment.appendChild(particle);
                    particles.push(particle);
                }

                particlesContainer.appendChild(fragment);
            }

            function clearParticles() {
                for (var i = particles.length - 1; i >= 0; i--) {
                    if (particles[i] && particles[i].parentNode) {
                        particles[i].parentNode.removeChild(particles[i]);
                    }
                }
                particles = [];
            }

            function openImageViewer(imageUrl) {
                if (!imageViewer || !imageViewerImg) return;
                imageViewerImg.src = imageUrl;
                imageViewer.classList.add('open');
            }

            function closeImageViewer() {
                if (!imageViewer || !imageViewerImg) return;
                imageViewer.classList.remove('open');
                setTimeout(function() {
                    if (imageViewerImg) imageViewerImg.src = '';
                }, 300);
            }

            function checkPassword() {
                if (isProcessingUnlock || !isLocked) return;
                if (!passwordInput) return;

                if (passwordInput.value.trim() === CORRECT_PASSWORD) {
                    isProcessingUnlock = true;
                    if (unlockBtn) unlockBtn.disabled = true;
                    if (lockScreen) lockScreen.classList.add('unlocked');
                    isLocked = false;
                    passwordInput.value = '';
                    passwordInput.classList.remove('error');

                    safeSetTimeout(function() {
                        isProcessingUnlock = false;
                        if (unlockBtn) unlockBtn.disabled = false;
                        if (messageInput) messageInput.focus();
                    }, 500);
                } else {
                    if (lockIcon) lockIcon.classList.add('shake');
                    passwordInput.classList.add('error');
                    passwordInput.value = '';
                    passwordInput.placeholder = 'Неверный пароль';
                    safeSetTimeout(function() {
                        if (lockIcon) lockIcon.classList.remove('shake');
                        passwordInput.classList.remove('error');
                        passwordInput.placeholder = 'Введите пароль';
                    }, 500);
                }
            }

            function lockChat() {
                if (isLocked) return;
                isLocked = true;
                if (lockScreen) lockScreen.classList.remove('unlocked');
                if (passwordInput) {
                    passwordInput.value = '';
                    passwordInput.classList.remove('error');
                    passwordInput.placeholder = 'Введите пароль';
                }
                closeSettings();
                safeSetTimeout(function() {
                    if (passwordInput) passwordInput.focus();
                }, 300);
            }

            function showMemory() {
                if (conversationMemory.length === 0) {
                    showToast('🧠 Память пуста');
                    return;
                }

                var summary = '🧠 ПАМЯТЬ ДИАЛОГА:\n\n';
                var lastMessages = conversationMemory.slice(-15);

                for (var i = 0; i < lastMessages.length; i++) {
                    var role = lastMessages[i].role === 'user' ? '👤 Вы' : '🤖 AI';
                    var content = lastMessages[i].content;
                    if (content.length > 50) {
                        content = content.substring(0, 50) + '...';
                    }
                    summary += role + ': ' + content + '\n';
                }

                if (userFacts.length > 0) {
                    summary += '\n📝 Факты:\n';
                    for (var j = 0; j < userFacts.length; j++) {
                        summary += '• ' + userFacts[j] + '\n';
                    }
                }

                summary += '\n💾 Сообщений: ' + conversationMemory.length;
                addMessage(summary, 'ai');
            }

            function clearChat() {
                if (!messagesContainer) return;
                var messages = messagesContainer.querySelectorAll('.message-bubble:not(.system)');
                for (var i = messages.length - 1; i >= 0; i--) {
                    if (messages[i].parentNode) {
                        messages[i].parentNode.removeChild(messages[i]);
                    }
                }
                conversationMemory = [];
                userFacts = [];
                addMessage('👋 Диалог очищен. Задай вопрос!', 'ai');
                showToast('🗑️ Чат очищен');
                saveMemory();
            }

            function addMessage(text, type, imageUrl) {
                if (!messagesContainer) return null;
                type = type || 'sent';
                imageUrl = imageUrl || null;

                var msgDiv = document.createElement('div');
                msgDiv.classList.add('message-bubble');
                if (type === 'sent') msgDiv.classList.add('sent');
                if (type === 'ai') msgDiv.classList.add('ai');
                if (type === 'system') msgDiv.classList.add('system');

                if (imageUrl) {
                    var img = document.createElement('img');
                    img.src = imageUrl;
                    img.classList.add('message-image');
                    img.onclick = function() {
                        openImageViewer(imageUrl);
                    };
                    msgDiv.appendChild(img);

                    if (text && text !== '[Фото]') {
                        var caption = document.createElement('div');
                        caption.classList.add('image-caption');
                        caption.textContent = '📷 ' + text;
                        msgDiv.appendChild(caption);
                    }
                }

                if (!(imageUrl && text === '[Фото]')) {
                    var textDiv = document.createElement('div');
                    textDiv.textContent = text || '';
                    msgDiv.appendChild(textDiv);
                }

                var timeDiv = document.createElement('div');
                timeDiv.classList.add('msg-time');
                var now = new Date();
                timeDiv.textContent = padNumber(now.getHours()) + ':' + padNumber(now.getMinutes());
                msgDiv.appendChild(timeDiv);

                messagesContainer.appendChild(msgDiv);
                requestAnimationFrame(function() {
                    if (messagesContainer) {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                });
                return msgDiv;
            }

            function addLoadingMessage() {
                if (!messagesContainer) return null;
                var msgDiv = document.createElement('div');
                msgDiv.classList.add('message-bubble', 'ai', 'loading');
                msgDiv.id = 'loadingMessage';

                var thinkText = document.createElement('div');
                thinkText.textContent = '💭 Думаю...';
                thinkText.style.fontSize = '12px';
                thinkText.style.marginBottom = '4px';
                thinkText.style.opacity = '0.6';
                msgDiv.appendChild(thinkText);

                var indicator = document.createElement('div');
                indicator.classList.add('typing-indicator');
                for (var i = 0; i < 3; i++) {
                    var dot = document.createElement('div');
                    dot.classList.add('typing-dot');
                    indicator.appendChild(dot);
                }

                msgDiv.appendChild(indicator);
                messagesContainer.appendChild(msgDiv);
                requestAnimationFrame(function() {
                    if (messagesContainer) {
                        messagesContainer.scrollTop = messagesContainer.scrollHeight;
                    }
                });
                return msgDiv;
            }

            function removeLoadingMessage() {
                var loading = document.getElementById('loadingMessage');
                if (loading && loading.parentNode) {
                    loading.parentNode.removeChild(loading);
                }
            }

            async function searchWikipedia(query) {
                try {
                    var url = WIKIPEDIA_API + '?action=query&list=search&srsearch=' + encodeURIComponent(query) + '&format=json&origin=*&srlimit=5';
                    var response = await fetch(url);
                    if (!response.ok) return null;
                    var data = await response.json();

                    if (data.query && data.query.search && data.query.search.length > 0) {
                        var results = data.query.search;
                        var answer = '🔍 Wikipedia:\n\n';
                        for (var i = 0; i < Math.min(results.length, 3); i++) {
                            var snippet = results[i].snippet.replace(/<\/?[^>]+(>|$)/g, '').trim();
                            if (snippet.length > 20) {
                                answer += '📌 ' + results[i].title + '\n' + snippet.substring(0, 200) + '...\n\n';
                            }
                        }
                        return answer;
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            async function searchDuckDuckGo(query) {
                try {
                    var url = DUCKDUCKGO_API + '?q=' + encodeURIComponent(query) + '&format=json&no_html=1';
                    var response = await fetch(url);
                    if (!response.ok) return null;
                    var data = await response.json();

                    if (data.AbstractText && data.AbstractText.length > 15) {
                        return '🔍 ' + data.AbstractText + '\n\n🌐 DuckDuckGo';
                    }
                    if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                        for (var i = 0; i < Math.min(data.RelatedTopics.length, 3); i++) {
                            var topic = data.RelatedTopics[i];
                            if (topic.Text && topic.Text.length > 15) {
                                return '🔍 ' + topic.Text.substring(0, 350) + '\n\n🌐 DuckDuckGo';
                            }
                        }
                    }
                    return null;
                } catch (e) {
                    return null;
                }
            }

            function analyzeImage(imageUrl) {
                return new Promise(function(resolve) {
                    var img = new Image();
                    img.crossOrigin = 'anonymous';
                    var resolved = false;

                    function safeResolve(data) {
                        if (!resolved) {
                            resolved = true;
                            resolve(data);
                        }
                    }

                    img.onload = function() {
                        var width = img.width;
                        var height = img.height;
                        var ratio = width / height;
                        var totalPixels = width * height;

                        var analysis = '🖼️ АНАЛИЗ ФОТО:\n\n';
                        analysis += '📐 ' + width + '×' + height + ' (' + (totalPixels / 1000000).toFixed(1) + ' МП)\n';

                        try {
                            var canvas = document.createElement('canvas');
                            var ctx = canvas.getContext('2d');
                            if (!ctx) {
                                safeResolve(analysis + '\n⚠️ Анализ недоступен');
                                return;
                            }

                            var maxSize = 150;
                            var scale = Math.min(maxSize / width, maxSize / height);
                            canvas.width = Math.floor(width * scale);
                            canvas.height = Math.floor(height * scale);

                            try {
                                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            } catch (drawError) {
                                safeResolve(analysis + '\n⚠️ Нет доступа к данным');
                                return;
                            }

                            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                            var data = imageData.data;
                            var totalR = 0, totalG = 0, totalB = 0;
                            var pixelCount = data.length / 4;

                            for (var i = 0; i < data.length; i += 4) {
                                totalR += data[i];
                                totalG += data[i + 1];
                                totalB += data[i + 2];
                            }

                            var avgR = Math.round(totalR / pixelCount);
                            var avgG = Math.round(totalG / pixelCount);
                            var avgB = Math.round(totalB / pixelCount);
                            var avgBrightness = (avgR + avgG + avgB) / 3;

                            analysis += '🎨 RGB(' + avgR + ', ' + avgG + ', ' + avgB + ')\n';

                            if (avgBrightness > 200) analysis += '💡 Очень светлое\n';
                            else if (avgBrightness > 150) analysis += '💡 Светлое\n';
                            else if (avgBrightness > 100) analysis += '🌓 Среднее\n';
                            else if (avgBrightness > 50) analysis += '🌑 Тёмное\n';
                            else analysis += '⚫ Очень тёмное\n';

                            if (ratio > 2.0) analysis += '\n📱 Панорама/скриншот\n';
                            else if (ratio > 1.4) analysis += '\n🖼️ Широкоформатное\n';
                            else if (ratio > 1.1) analysis += '\n📷 Стандартное\n';
                            else if (ratio > 0.9) analysis += '\n⬜ Квадратное\n';
                            else if (ratio > 0.7) analysis += '\n📱 Портретное\n';
                            else analysis += '\n📱 Высокое\n';

                            analysis += '\n💡 ПРЕДПОЛОЖЕНИЯ:\n';
                            if (avgBrightness > 180) analysis += '• Возможно: документ\n';
                            else if (avgBrightness > 150) analysis += '• Возможно: дневное фото\n';
                            else if (avgBrightness < 80) analysis += '• Возможно: ночное фото\n';
                            if (ratio > 1.8 || ratio < 0.6) analysis += '• Возможно: скриншот\n';
                            analysis += '\n📝 Расскажи подробнее!';

                            safeResolve(analysis);
                        } catch (e) {
                            safeResolve(analysis + '\n⚠️ Частичный анализ');
                        }
                    };

                    img.onerror = function() {
                        safeResolve('🖼️ Фото получено! Расскажи, что на нём.');
                    };

                    img.src = imageUrl;
                });
            }

            function solveMath(msg) {
                var cleanMsg = msg.toLowerCase().replace(/\s/g, '');
                cleanMsg = cleanMsg.replace(/умножитьна|умножить|×|х/g, '*');
                cleanMsg = cleanMsg.replace(/разделитьна|разделить|поделитьна|поделить|÷/g, '/');
                cleanMsg = cleanMsg.replace(/плюс/g, '+');
                cleanMsg = cleanMsg.replace(/минус/g, '-');

                var mathMatch = cleanMsg.match(/[\d\+\-\*\/\(\)\.\,]+/);
                if (mathMatch && /[\+\-\*\/]/.test(mathMatch[0]) && mathMatch[0].length > 2) {
                    try {
                        var expression = mathMatch[0].replace(/,/g, '.');
                        var result = eval(expression);
                        if (isFinite(result) && !isNaN(result)) {
                            var roundedResult = isInteger(result) ? result : parseFloat(result.toFixed(6));
                            return '🧮 ' + expression.replace(/\*/g, '×').replace(/\//g, '÷') + ' = ' + roundedResult;
                        }
                    } catch (e) {}
                }

                var howMuchMatch = msg.match(/сколько\s+будет\s+([\d\s\+\-\*\/\(\)\.\,]+)/i);
                if (howMuchMatch) {
                    try {
                        var expr = howMuchMatch[1].replace(/\s/g, '').replace(/,/g, '.');
                        var res = eval(expr);
                        if (isFinite(res) && !isNaN(res)) {
                            return '🧮 ' + howMuchMatch[1] + ' = ' + (isInteger(res) ? res : parseFloat(res.toFixed(6)));
                        }
                    } catch (e) {}
                }

                return null;
            }

            function generateSmartResponse(userMessage) {
                var msg = userMessage.toLowerCase().trim();

                var keys = Object.keys(knowledgeBase);
                for (var i = 0; i < keys.length; i++) {
                    if (msg.indexOf(keys[i]) !== -1) {
                        return knowledgeBase[keys[i]];
                    }
                }

                if (msg.indexOf('зовут') !== -1 || msg.indexOf('имя') !== -1) {
                    var nameMatch = msg.match(/зовут\s+(\w+)|имя\s+(\w+)/i);
                    if (nameMatch) {
                        var name = nameMatch[1] || nameMatch[2];
                        if (name && name.length > 1) {
                            userFacts.push('Имя: ' + name);
                            return 'Приятно познакомиться, ' + name + '! 😊';
                        }
                    }
                }

                if (msg.indexOf('я из') !== -1 || msg.indexOf('живу в') !== -1) {
                    var cityMatch = msg.match(/(?:из|в)\s+([А-ЯA-Z]\w+)/i);
                    if (cityMatch && cityMatch[1]) {
                        userFacts.push('Город: ' + cityMatch[1]);
                        return 'Запомнил! ' + cityMatch[1] + ' — отличный город.';
                    }
                }

                var mathResult = solveMath(userMessage);
                if (mathResult) return mathResult;

                if (msg.indexOf('время') !== -1 || msg.indexOf('дата') !== -1 || msg.indexOf('число') !== -1 || msg.indexOf('какой сегодня') !== -1 || msg.indexOf('который час') !== -1) {
                    var now = new Date();
                    var days = ['воскресенье', 'понедельник', 'вторник', 'среда', 'четверг', 'пятница', 'суббота'];
                    var months = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'];
                    return '🕐 ' + now.toLocaleTimeString('ru-RU') + '\n📅 ' + days[now.getDay()] + ', ' + now.getDate() + ' ' + months[now.getMonth()] + ' ' + now.getFullYear();
                }

                if (msg.indexOf('погода') !== -1) {
                    return '🌤 Уточни город! Напиши: "Погода в Москве"';
                }

                if (msg.indexOf('почему') !== -1 || msg.indexOf('зачем') !== -1 || msg.indexOf('как работает') !== -1) {
                    return '🤔 Ищу информацию по теме: "' + userMessage.substring(0, 80) + '"';
                }

                return null;
            }

            function generateContextualResponse(userMessage) {
                if (!settings.memoryEnabled || conversationMemory.length < 3) return null;
                var msg = userMessage.toLowerCase();

                if (msg.indexOf('да') !== -1 || msg.indexOf('конечно') !== -1) {
                    return 'Отлично! Продолжаем. Что ещё интересует?';
                }
                if (msg.indexOf('нет') !== -1 || msg.indexOf('не то') !== -1) {
                    return 'Понял! Давай сменим тему. О чём хочешь поговорить?';
                }

                var responses = [
                    'Учитывая наш разговор, давай продолжим!',
                    'Я помню контекст. Что ещё интересует?',
                    'Исходя из истории диалога, предлагаю углубиться.'
                ];
                return responses[Math.floor(Math.random() * responses.length)];
            }

            async function processMessage(userMessage, isImage, imageUrl) {
                if (isProcessingMessage || isDestroyed) return;
                isProcessingMessage = true;
                if (sendBtn) sendBtn.disabled = true;
                isImage = isImage || false;
                imageUrl = imageUrl || null;

                if (isImage && imageUrl) {
                    addMessage(userMessage || '[Фото]', 'sent', imageUrl);
                    conversationMemory.push({ role: 'user', content: userMessage || '[Отправлено фото]' });

                    if (settings.visionEnabled) {
                        addLoadingMessage();
                        try {
                            var analysis = await analyzeImage(imageUrl);
                            think(function() {
                                removeLoadingMessage();
                                addMessage(analysis, 'ai');
                                conversationMemory.push({ role: 'assistant', content: analysis });
                                trimMemory();
                                finishProcessing();
                            });
                            return;
                        } catch (e) {
                            removeLoadingMessage();
                            addMessage('❌ Не удалось проанализировать фото.', 'ai');
                        }
                    } else {
                        addMessage('📷 Фото получено! Включи распознавание в настройках.', 'ai');
                    }
                } else {
                    addMessage(userMessage, 'sent');
                    conversationMemory.push({ role: 'user', content: userMessage });
                    trimMemory();
                    addLoadingMessage();

                    var response = generateSmartResponse(userMessage);

                    if (!response && settings.searchEnabled) {
                        var searchResult = await searchDuckDuckGo(userMessage);
                        if (!searchResult) {
                            searchResult = await searchWikipedia(userMessage);
                        }
                        if (searchResult) {
                            response = searchResult;
                        }
                    }

                    if (!response) {
                        response = generateContextualResponse(userMessage);
                    }

                    if (!response) {
                        var fallbacks = [
                            '💡 Интересно! Расскажи подробнее.',
                            '🤔 Я могу поискать информацию. Что конкретно интересует?',
                            '📚 Хороший вопрос! Давай уточним детали.',
                            '🧠 Я проанализировал запрос. Что выберешь?'
                        ];
                        response = fallbacks[Math.floor(Math.random() * fallbacks.length)];
                    }

                    think(function() {
                        removeLoadingMessage();
                        addMessage(response, 'ai');
                        conversationMemory.push({ role: 'assistant', content: response });
                        trimMemory();
                        finishProcessing();
                    });
                    return;
                }

                trimMemory();
                finishProcessing();
            }

            function trimMemory() {
                if (conversationMemory.length > MAX_MEMORY) {
                    conversationMemory = conversationMemory.slice(-MAX_MEMORY);
                }
            }

            function sendMessage() {
                if (!messageInput) return;
                var text = messageInput.value.trim();
                if (!text || isProcessingMessage) return;
                messageInput.value = '';
                processMessage(text, false, null);
            }

            function handleFileSelect(event) {
                if (isProcessingMessage) {
                    fileInput.value = '';
                    showToast('⚠️ Подождите, идёт обработка');
                    return;
                }
                var file = event.target.files[0];
                if (!file) return;

                if (!file.type.match(/^image\//)) {
                    showToast('⚠️ Только изображения');
                    fileInput.value = '';
                    return;
                }

                if (file.size > IMAGE_MAX_SIZE) {
                    showToast('⚠️ Максимум 30MB');
                    fileInput.value = '';
                    return;
                }

                showToast('📷 Анализирую...');

                var reader = new FileReader();
                reader.onload = function(e) {
                    if (e.target && e.target.result) {
                        processMessage('[Фото]', true, e.target.result);
                    }
                };
                reader.onerror = function() {
                    showToast('❌ Ошибка загрузки');
                };
                reader.readAsDataURL(file);
                fileInput.value = '';
            }

            function openSettings() {
                if (settingsModal) settingsModal.classList.add('open');
                if (settingsOverlay) settingsOverlay.classList.add('visible');
            }

            function closeSettings() {
                if (settingsModal) settingsModal.classList.remove('open');
                if (settingsOverlay) settingsOverlay.classList.remove('visible');
                if (searchToggle) settings.searchEnabled = searchToggle.checked;
                if (memoryToggle) settings.memoryEnabled = memoryToggle.checked;
                if (visionToggle) settings.visionEnabled = visionToggle.checked;
                saveSettings();
            }

            function applyTheme(theme) {
                settings.theme = theme;
                if (phoneFrame) {
                    phoneFrame.className = 'phone-frame';
                    if (theme === 'light') {
                        phoneFrame.classList.add('theme-light');
                    }
                }

                for (var i = 0; i < themeButtons.length; i++) {
                    var btn = themeButtons[i];
                    if (btn.dataset.theme === theme) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }

                saveSettings();
                showToast(theme === 'light' ? '☀️ Светлая тема' : '🌙 Тёмная тема', 1500);
            }

            function saveSettings() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
                } catch (e) {}
            }

            function loadSettings() {
                try {
                    var saved = localStorage.getItem(STORAGE_KEY);
                    if (saved) {
                        var parsed = JSON.parse(saved);
                        if (parsed.theme) settings.theme = parsed.theme;
                        if (typeof parsed.searchEnabled === 'boolean') settings.searchEnabled = parsed.searchEnabled;
                        if (typeof parsed.memoryEnabled === 'boolean') settings.memoryEnabled = parsed.memoryEnabled;
                        if (typeof parsed.visionEnabled === 'boolean') settings.visionEnabled = parsed.visionEnabled;
                    }

                    if (phoneFrame) {
                        phoneFrame.className = 'phone-frame';
                        if (settings.theme === 'light') {
                            phoneFrame.classList.add('theme-light');
                        }
                    }

                    if (searchToggle) searchToggle.checked = settings.searchEnabled;
                    if (memoryToggle) memoryToggle.checked = settings.memoryEnabled;
                    if (visionToggle) visionToggle.checked = settings.visionEnabled;

                    for (var i = 0; i < themeButtons.length; i++) {
                        var btn = themeButtons[i];
                        if (btn.dataset.theme === settings.theme) {
                            btn.classList.add('active');
                        } else {
                            btn.classList.remove('active');
                        }
                    }

                    var savedMemory = localStorage.getItem(MEMORY_KEY);
                    if (savedMemory && settings.memoryEnabled) {
                        try {
                            conversationMemory = JSON.parse(savedMemory);
                        } catch (e) {
                            conversationMemory = [];
                        }
                    }

                    var savedFacts = localStorage.getItem(FACTS_KEY);
                    if (savedFacts) {
                        try {
                            userFacts = JSON.parse(savedFacts);
                        } catch (e) {
                            userFacts = [];
                        }
                    }
                } catch (e) {}
            }

            function bindEvents() {
                if (unlockBtn) unlockBtn.addEventListener('click', function(e) { e.preventDefault(); checkPassword(); });
                if (passwordInput) passwordInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter') { e.preventDefault(); checkPassword(); }
                });
                if (lockChatBtn) lockChatBtn.addEventListener('click', function(e) { e.preventDefault(); lockChat(); });
                if (memoryBtn) memoryBtn.addEventListener('click', function(e) { e.preventDefault(); showMemory(); });
                if (clearChatBtn) clearChatBtn.addEventListener('click', function(e) { e.preventDefault(); clearChat(); });
                if (settingsIcon) settingsIcon.addEventListener('click', function(e) {
                    e.preventDefault(); e.stopPropagation(); openSettings();
                });
                if (closeSettingsBtn) closeSettingsBtn.addEventListener('click', function(e) { e.preventDefault(); closeSettings(); });
                if (settingsOverlay) settingsOverlay.addEventListener('click', function(e) { e.preventDefault(); closeSettings(); });
                if (settingsModal) settingsModal.addEventListener('click', function(e) { e.stopPropagation(); });
                if (attachBtn) attachBtn.addEventListener('click', function(e) { e.preventDefault(); if (fileInput) fileInput.click(); });
                if (fileInput) fileInput.addEventListener('change', handleFileSelect);
                if (sendBtn) sendBtn.addEventListener('click', function(e) { e.preventDefault(); sendMessage(); });
                if (messageInput) messageInput.addEventListener('keydown', function(e) {
                    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
                });

                if (imageViewerClose) imageViewerClose.addEventListener('click', function() { closeImageViewer(); });
                if (imageViewer) imageViewer.addEventListener('click', function(e) {
                    if (e.target === imageViewer) { closeImageViewer(); }
                });

                for (var i = 0; i < themeButtons.length; i++) {
                    (function(btn) {
                        btn.addEventListener('click', function(e) {
                            e.preventDefault();
                            applyTheme(btn.dataset.theme);
                        });
                    })(themeButtons[i]);
                }

                document.addEventListener('gesturestart', function(e) { e.preventDefault(); }, { passive: false });

                var lastTouchEnd = 0;
                document.addEventListener('touchend', function(e) {
                    var now = Date.now();
                    if (now - lastTouchEnd <= 300) e.preventDefault();
                    lastTouchEnd = now;
                }, { passive: false });
            }

            function init() {
                bindEvents();
                createParticles();
                loadSettings();
                if (passwordInput) passwordInput.focus();
            }

            function destroy() {
                isDestroyed = true;
                clearTimeout(thinkingTimer);
                clearTimeout(toastTimer);
                clearParticles();
            }

            window.addEventListener('beforeunload', destroy);
            window.addEventListener('pagehide', destroy);

            init();
        })();
    </script>
</body>
</html>
