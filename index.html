<script>
(function() {
  'use strict';

  var CORRECT_PASSWORD = '1394';
  var STORAGE_KEY = 'ai_bot_settings_v1';
  var CHAT_KEY = 'ai_bot_chat_v1';
  var DUCKDUCKGO_API = 'https://api.duckduckgo.com/';

  var lockScreen = document.getElementById('lockScreen');
  var lockIcon = document.getElementById('lockIcon');
  var passwordInput = document.getElementById('passwordInput');
  var unlockBtn = document.getElementById('unlockBtn');
  var lockChatBtn = document.getElementById('lockChatBtn');
  var memoryBtn = document.getElementById('memoryBtn');
  var clearChatBtn = document.getElementById('clearChatBtn');
  var settingsIcon = document.getElementById('settingsIcon');
  var settingsModal = document.getElementById('settingsModal');
  var settingsOverlay = document.getElementById('settingsOverlay');
  var closeSettingsBtn = document.getElementById('closeSettingsBtn');
  var messageInput = document.getElementById('messageInput');
  var sendBtn = document.getElementById('sendBtn');
  var messagesContainer = document.getElementById('messagesContainer');
  var phoneFrame = document.getElementById('phoneFrame');
  var particlesContainer = document.getElementById('particlesContainer');
  var themeButtons = document.querySelectorAll('.theme-btn');
  var toast = document.getElementById('toast');
  var searchToggle = document.getElementById('searchToggle');
  var memoryToggle = document.getElementById('memoryToggle');
  var visionToggle = document.getElementById('visionToggle');
  var attachBtn = document.getElementById('attachBtn');
  var fileInput = document.getElementById('fileInput');

  var isLocked = true;
  var isProcessingUnlock = false;
  var isProcessingMessage = false;
  var toastTimer;
  var particles = [];
  var pendingImageData = null;

  var settings = {
    theme: 'dark',
    searchEnabled: true,
    memoryEnabled: true,
    visionEnabled: true
  };

  function padNumber(num) {
    return num < 10 ? '0' + num : '' + num;
  }

  function nowTime() {
    var d = new Date();
    return padNumber(d.getHours()) + ':' + padNumber(d.getMinutes());
  }

  function showToast(message, duration) {
    duration = duration || 2000;
    toast.textContent = message;
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() {
      toast.classList.remove('show');
    }, duration);
  }

  function applyTheme(theme) {
    phoneFrame.classList.remove('theme-light', 'theme-dark');
    phoneFrame.classList.add(theme === 'light' ? 'theme-light' : 'theme-dark');
    themeButtons.forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.theme === theme);
    });
  }

  function loadSettings() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) settings = Object.assign(settings, JSON.parse(raw));
    } catch (e) {}
    searchToggle.checked = !!settings.searchEnabled;
    memoryToggle.checked = !!settings.memoryEnabled;
    visionToggle.checked = !!settings.visionEnabled;
    applyTheme(settings.theme || 'dark');
  }

  function saveSettings() {
    settings.theme = document.querySelector('.theme-btn.active')?.dataset.theme || settings.theme;
    settings.searchEnabled = searchToggle.checked;
    settings.memoryEnabled = memoryToggle.checked;
    settings.visionEnabled = visionToggle.checked;
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
    } catch (e) {}
  }

  function saveChat() {
    try {
      localStorage.setItem(CHAT_KEY, JSON.stringify({
        html: messagesContainer.innerHTML
      }));
    } catch (e) {}
  }

  function restoreChat() {
    try {
      var raw = localStorage.getItem(CHAT_KEY);
      if (!raw) return;
      var data = JSON.parse(raw);
      if (data && data.html) messagesContainer.innerHTML = data.html;
    } catch (e) {}
  }

  function isEmptyMessage(text) {
    return !text || !text.replace(/\s+/g, '').length;
  }

  function detectIntent(text) {
    var t = (text || '').toLowerCase();
    if (/^(привет|здравствуй|здорова|hey|hi)\b/.test(t)) return 'greeting';
    if (/\b(фото|картинк|изображ|скрин|что на фото|распознай|посмотри)\b/.test(t)) return 'vision';
    if (/\b(поиск|найди|в интернете|интернет|актуально|сейчас|latest)\b/.test(t)) return 'search';
    if (/\b(кто ты|что ты умеешь|помощь|help)\b/.test(t)) return 'help';
    if (/^\//.test(t)) return 'command';
    return 'chat';
  }

  function addMessage(text, cls) {
    var b = document.createElement('div');
    b.className = 'message-bubble ' + (cls || 'ai');
    b.textContent = text;
    messagesContainer.appendChild(b);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    saveChat();
    return b;
  }

  function addTyping() {
    var el = document.createElement('div');
    el.className = 'message-bubble loading';
    el.id = 'typingBubble';
    el.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    messagesContainer.appendChild(el);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
  }

  function removeTyping() {
    var el = document.getElementById('typingBubble');
    if (el && el.parentNode) el.parentNode.removeChild(el);
  }

  function webSearch(query) {
    return fetch(DUCKDUCKGO_API + '?q=' + encodeURIComponent(query) + '&format=json&no_html=1&skip_disambig=1')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var abs = data.AbstractText || '';
        var heading = data.Heading || '';
        var related = (data.RelatedTopics || []).slice(0, 3).map(function(x) {
          return x.Text || '';
        }).filter(Boolean);

        var out = [];
        if (heading) out.push('• ' + heading);
        if (abs) out.push(abs);
        if (related.length) out.push('• ' + related.join('\n• '));
        return out.join('\n\n') || 'Ничего не нашёл по запросу.';
      })
      .catch(function() {
        return 'Не удалось выполнить поиск.';
      });
  }

  function analyzeImage(file) {
    return new Promise(function(resolve) {
      var reader = new FileReader();
      reader.onload = function() {
        pendingImageData = reader.result;
        resolve('Изображение загружено. Теперь отправь текстом, что именно нужно проверить на фото.');
      };
      reader.readAsDataURL(file);
    });
  }

  function handleMessage(text) {
    var intent = detectIntent(text);

    if (intent === 'greeting') return Promise.resolve('Привет! Я готов помочь.');
    if (intent === 'help') return Promise.resolve('Я умею искать в интернете, отвечать на вопросы и анализировать изображения.');
    if (intent === 'command') return Promise.resolve('Команды пока не подключены.');
    if (intent === 'search' && settings.searchEnabled) return webSearch(text);
    if (intent === 'vision' && settings.visionEnabled && pendingImageData) {
      return Promise.resolve('У меня уже есть изображение. Опиши, что именно нужно найти, прочитать или проверить на нём.');
    }

    return Promise.resolve('Я получил сообщение: ' + text);
  }

  function sendMessage() {
    if (isProcessingMessage) return;

    var text = messageInput.value;
    if (isEmptyMessage(text)) {
      showToast('Напиши сообщение');
      return;
    }

    isProcessingMessage = true;
    addMessage(text, 'sent');
    messageInput.value = '';
    addTyping();

    handleMessage(text).then(function(answer) {
      removeTyping();
      addMessage(answer, 'ai');
      isProcessingMessage = false;
    }).catch(function() {
      removeTyping();
      addMessage('Ошибка обработки сообщения.', 'ai');
      isProcessingMessage = false;
    });
  }

  function checkPassword() {
    if (isProcessingUnlock || !isLocked) return;

    if (passwordInput.value.trim() === CORRECT_PASSWORD) {
      isProcessingUnlock = true;
      unlockBtn.disabled = true;
      lockScreen.classList.add('unlocked');
      isLocked = false;
      passwordInput.value = '';
      passwordInput.classList.remove('error');

      setTimeout(function() {
        isProcessingUnlock = false;
        unlockBtn.disabled = false;
        messageInput.focus();
      }, 500);
    } else {
      lockIcon.classList.add('shake');
      passwordInput.classList.add('error');
      passwordInput.value = '';
      passwordInput.placeholder = 'Неверный пароль';

      setTimeout(function() {
        lockIcon.classList.remove('shake');
        passwordInput.classList.remove('error');
        passwordInput.placeholder = 'Введите пароль';
      }, 500);
    }
  }

  function createParticles() {
    var fragment = document.createDocumentFragment();
    var colors = [
      'rgba(0, 180, 255, 0.5)',
      'rgba(123, 47, 255, 0.4)',
      'rgba(0, 200, 255, 0.3)',
      'rgba(255, 45, 149, 0.3)'
    ];

    for (var i = 0; i < 18; i++) {
      var p = document.createElement('div');
      p.className = 'particle';
      var size = 2 + Math.random() * 5;
      p.style.width = size + 'px';
      p.style.height = size + 'px';
      p.style.left = Math.random() * 100 + '%';
      p.style.setProperty('--duration', (5 + Math.random() * 7) + 's');
      p.style.setProperty('--delay', Math.random() * 7 + 's');
      p.style.setProperty('--max-opacity', String(0.3 + Math.random() * 0.5));
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      fragment.appendChild(p);
      particles.push(p);
    }

    particlesContainer.appendChild(fragment);
  }

  unlockBtn.addEventListener('click', checkPassword);
  passwordInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') checkPassword();
  });

  lockChatBtn.addEventListener('click', function() {
    isLocked = true;
    lockScreen.classList.remove('unlocked');
    passwordInput.focus();
  });

  settingsIcon.addEventListener('click', function() {
    settingsModal.classList.add('open');
    settingsOverlay.classList.add('visible');
  });

  closeSettingsBtn.addEventListener('click', function() {
    settingsModal.classList.remove('open');
    settingsOverlay.classList.remove('visible');
    saveSettings();
    showToast('Настройки сохранены');
  });

  settingsOverlay.addEventListener('click', function() {
    settingsModal.classList.remove('open');
    settingsOverlay.classList.remove('visible');
    saveSettings();
  });

  themeButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      applyTheme(btn.dataset.theme);
      saveSettings();
    });
  });

  searchToggle.addEventListener('change', saveSettings);
  memoryToggle.addEventListener('change', saveSettings);
  visionToggle.addEventListener('change', saveSettings);

  clearChatBtn.addEventListener('click', function() {
    messagesContainer.innerHTML = '';
    addMessage('Чат очищен', 'system');
    saveChat();
  });

  sendBtn.addEventListener('click', sendMessage);

  messageInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  attachBtn.addEventListener('click', function() {
    fileInput.click();
  });

  fileInput.addEventListener('change', function() {
    var file = fileInput.files && fileInput.files[0];
    if (!file) return;

    addMessage('📎 ' + file.name, 'sent');
    addTyping();

    analyzeImage(file).then(function(answer) {
      removeTyping();
      addMessage(answer, 'ai');
      fileInput.value = '';
    });
  });

  createParticles();
  loadSettings();
  restoreChat();

  if (!messagesContainer.children.length) {
    addMessage('🤖 Нейросеть активирована', 'system');
    addMessage('Готов к сообщениям, поиску и изображениям.', 'ai');
  }
})();
</script>
