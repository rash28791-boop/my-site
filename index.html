<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Гюльмира — Спасение принцессы</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Press Start 2P', system-ui;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
        }
        
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 500px;
            max-height: 800px;
            margin: 0 auto;
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff;
            border: 4px solid #fff;
            overflow: hidden;
            image-rendering: pixelated;
            background: #0a001f;
            touch-action: none;
        }
        
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #0a001f;
            touch-action: none;
            cursor: crosshair;
        }
        
        #preload {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, #1a0033, #4a0066, #1a0033);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ff00ff;
            font-size: 22px;
            text-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
            z-index: 100;
            text-align: center;
            padding: 20px;
            animation: bgPulse 3s ease-in-out infinite;
        }
        
        @keyframes bgPulse {
            0%, 100% { background: linear-gradient(135deg, #1a0033, #4a0066, #1a0033); }
            50% { background: linear-gradient(135deg, #2a0044, #6a0088, #2a0044); }
        }
        
        .preload-title {
            font-size: 38px;
            margin-bottom: 8px;
            animation: glowText 2s ease-in-out infinite alternate;
        }
        
        @keyframes glowText {
            0% { text-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff; }
            100% { text-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00ff, 0 0 120px #ff00ff; }
        }
        
        .heart {
            font-size: 70px;
            animation: pulse 1.5s infinite;
            margin: 15px 0;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .preload-btn {
            background: linear-gradient(45deg, #ff00ff, #ff66ff);
            color: #000;
            border: 4px solid #fff;
            padding: 15px 45px;
            margin-top: 20px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff00ff, 0 0 60px #ff00ff;
            transition: all 0.3s;
            font-family: 'Press Start 2P', system-ui;
            touch-action: manipulation;
            min-width: 150px;
            border-radius: 8px;
        }
        
        .preload-btn:active {
            transform: scale(0.95);
        }
        
        #menu {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, #1a0033, #0a001a);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            z-index: 10;
        }
        
        .menu-title {
            font-size: 34px;
            margin-bottom: 8px;
            text-shadow: 0 0 30px #00ffff, 0 0 60px #00ffff;
            animation: glow 2s infinite alternate;
        }
        
        @keyframes glow {
            0% { text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff; }
            100% { text-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00ff, 0 0 120px #ff00ff; }
        }
        
        .menu-btn {
            background: linear-gradient(45deg, #ff00ff, #ff66ff);
            color: #000;
            border: 4px solid #fff;
            padding: 12px 35px;
            margin: 8px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 0 30px #ff00ff;
            transition: all 0.3s;
            font-family: 'Press Start 2P', system-ui;
            min-width: 160px;
            touch-action: manipulation;
            border-radius: 8px;
        }
        
        .menu-btn:active {
            transform: scale(0.95);
        }
        
        .menu-heart {
            font-size: 45px;
            margin: 10px 0;
            animation: pulse 1.5s infinite;
        }
        
        #settings {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 0, 31, 0.98);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #00ffff;
            z-index: 20;
            padding: 20px;
        }
        
        .setting {
            margin: 15px 0;
            font-size: 16px;
            text-align: center;
            width: 80%;
        }
        
        .slider-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        
        .slider {
            width: 200px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #ff00ff, #00ffff);
            height: 8px;
            border-radius: 4px;
            touch-action: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #fff;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 20px #ff00ff;
        }
        
        .setting-btn {
            background: linear-gradient(45deg, #ff00ff, #ff66ff);
            color: #000;
            border: 4px solid #fff;
            padding: 10px 35px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Press Start 2P', system-ui;
            touch-action: manipulation;
            border-radius: 8px;
            box-shadow: 0 0 20px #ff00ff;
        }
        
        .setting-btn:active {
            transform: scale(0.95);
        }
        
        #game {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 0, 31, 0.98);
            display: none;
            z-index: 5;
        }
        
        #hud {
            position: absolute;
            top: 10px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            color: #fff;
            font-size: 10px;
            text-shadow: 0 0 15px #ff00ff;
            z-index: 30;
            pointer-events: none;
        }
        
        #hud span {
            background: rgba(0,0,0,0.8);
            padding: 4px 10px;
            border-radius: 6px;
            border: 2px solid #ff00ff;
            font-size: 10px;
            box-shadow: 0 0 20px rgba(255,0,255,0.3);
        }
        
        #hud .time-display {
            border-color: #ffff00;
            color: #ffff00;
            box-shadow: 0 0 20px rgba(255,255,0,0.3);
        }
        
        #upgrade-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: linear-gradient(45deg, #ff00ff, #ff66ff);
            color: #000;
            border: 3px solid #fff;
            padding: 8px 14px;
            font-size: 10px;
            cursor: pointer;
            z-index: 30;
            font-family: 'Press Start 2P', system-ui;
            box-shadow: 0 0 30px #ff00ff;
            transition: all 0.3s;
            touch-action: manipulation;
            border-radius: 6px;
        }
        
        #upgrade-btn:active {
            transform: scale(0.95);
        }
        
        #upgrade-btn:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
        }
        
        #score-display {
            position: absolute;
            bottom: 15px;
            left: 15px;
            color: #ffff00;
            font-size: 10px;
            z-index: 30;
            background: rgba(0,0,0,0.8);
            padding: 4px 12px;
            border-radius: 6px;
            border: 2px solid #ffff00;
            pointer-events: none;
            box-shadow: 0 0 20px rgba(255,255,0,0.3);
        }
        
        #win {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(10, 0, 31, 0.95);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #ffff00;
            z-index: 40;
            text-align: center;
            padding: 20px;
        }
        
        .win-title {
            font-size: 30px;
            margin-bottom: 8px;
            text-shadow: 0 0 40px #ff00ff, 0 0 80px #ff00ff;
            animation: glowText 2s ease-in-out infinite alternate;
        }
        
        .win-sub {
            font-size: 18px;
            margin: 6px 0;
            color: #fff;
            text-shadow: 0 0 20px #00ffff;
        }
        
        .win-heart {
            font-size: 55px;
            animation: pulse 1.5s infinite;
        }
        
        .win-buttons {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 15px;
        }
        
        .win-btn {
            background: linear-gradient(45deg, #00ff00, #66ff66);
            color: #000;
            border: 4px solid #fff;
            padding: 12px 35px;
            font-size: 16px;
            cursor: pointer;
            font-family: 'Press Start 2P', system-ui;
            box-shadow: 0 0 30px #00ff00;
            transition: all 0.3s;
            touch-action: manipulation;
            border-radius: 8px;
        }
        
        .win-btn:active {
            transform: scale(0.95);
        }
        
        .win-btn-restart {
            background: linear-gradient(45deg, #ff00ff, #ff66ff);
            box-shadow: 0 0 30px #ff00ff;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="preload">
            <div class="preload-title">ГЮЛЬМИРА</div>
            <div class="heart">❤️</div>
            <div>ЭТА ИГРА ДЛЯ ТЕБЯ</div>
            <button class="preload-btn" onclick="showMenu()">ДАЛЕЕ</button>
        </div>

        <div id="menu">
            <div class="menu-title">ГЮЛЬМИРА</div>
            <div class="menu-heart">❤️</div>
            <button class="menu-btn" onclick="startGame()">ИГРАТЬ</button>
            <button class="menu-btn" onclick="showSettings()">НАСТРОЙКИ</button>
            <button class="menu-btn" onclick="location.reload()">ВЫХОД</button>
        </div>

        <div id="settings">
            <div style="font-size:24px; margin-bottom:20px; text-shadow: 0 0 30px #00ffff;">НАСТРОЙКИ</div>
            
            <div class="setting">
                <div style="margin-bottom:8px;">ЗВУК</div>
                <div class="slider-container">
                    <input type="range" id="sound-slider" min="0" max="1" step="0.05" value="0.7" oninput="changeVolume(this.value)" class="slider">
                    <span id="volume-label" style="min-width:40px;">70%</span>
                </div>
            </div>
            
            <div class="setting">
                <button class="setting-btn" onclick="hideSettings()">НАЗАД</button>
            </div>
        </div>

        <div id="game">
            <div id="hud">
                <span>🧟 <span id="count">0</span>/<span id="total">45</span></span>
                <span class="time-display">⏱ <span id="time">90</span>с</span>
                <span>🔫 <span id="level">1</span></span>
            </div>
            <div id="score-display">💥 <span id="score">0</span></div>
            <button id="upgrade-btn" onclick="upgradeWeapon()">⬆ УЛУЧШИТЬ</button>
            <canvas id="gameCanvas"></canvas>
        </div>

        <div id="win">
            <div class="win-title">🎉 ПРИНЦЕССА СПАСЕНА! ❤️</div>
            <div class="win-heart">❤️</div>
            <div class="win-sub">ГЮЛЬМИРА СПАСЕНА!</div>
            <div class="win-sub" style="font-size:14px; color:#ff00ff; margin-top:5px;">ТЫ — НАСТОЯЩИЙ ГЕРОЙ!</div>
            <div class="win-buttons">
                <button class="win-btn" onclick="returnToMenu()">ПРОДОЛЖИТЬ</button>
                <button class="win-btn win-btn-restart" onclick="startGame()">ПОПРОБОВАТЬ ЕЩЁ РАЗ</button>
            </div>
        </div>
    </div>

    <script>
        // ============================================================
        //  ИГРА ДЛЯ ГЮЛЬМИРЫ (ЛЁГКАЯ ВЕРСИЯ)
        // ============================================================
        
        let canvas, ctx;
        let volume = 0.7;
        let zombies = [];
        let bullets = [];
        let particles = [];
        let celebrationParticles = [];
        let score = 0;
        let gameState = 'preload';
        let hero = { x: 0, y: 0, w: 40, h: 50 };
        let mouse = { x: 0, y: 0 };
        let lastSpawn = 0;
        let spawnInterval = 2000;
        let lastShot = 0;
        let shotCooldown = 220;
        let weaponLevel = 1;
        let weaponUpgradeCost = 3;
        let totalZombiesToKill = 45;
        let zombiesKilled = 0;
        let gameStarted = false;
        let zombieSpawnCount = 1;
        let containerWidth = 0;
        let containerHeight = 0;
        let showPrincess = false;
        let gameTime = 90;
        let timerInterval = null;
        let gameOverTriggered = false;
        let princessAppeared = false;
        let maxZombiesOnScreen = 5;
        let winShown = false;
        
        const preloadDiv = document.getElementById('preload');
        const menuDiv = document.getElementById('menu');
        const settingsDiv = document.getElementById('settings');
        const gameDiv = document.getElementById('game');
        const winDiv = document.getElementById('win');
        const countSpan = document.getElementById('count');
        const totalSpan = document.getElementById('total');
        const levelSpan = document.getElementById('level');
        const scoreSpan = document.getElementById('score');
        const timeSpan = document.getElementById('time');
        const upgradeBtn = document.getElementById('upgrade-btn');

        function initCanvas() {
            canvas = document.getElementById('gameCanvas');
            if (!canvas) {
                canvas = document.createElement('canvas');
                canvas.id = 'gameCanvas';
                document.getElementById('game').appendChild(canvas);
            }
            ctx = canvas.getContext('2d');
            ctx.imageSmoothingEnabled = false;
            resizeCanvas();
            
            canvas.addEventListener('touchstart', handleTouch, { passive: false });
            canvas.addEventListener('touchmove', handleTouch, { passive: false });
            canvas.addEventListener('click', handleClick);
            
            document.addEventListener('keydown', (e) => {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (gameState === 'playing' && gameStarted) shoot();
                }
                if (e.key === 'u' || e.key === 'U') upgradeWeapon();
            });
        }

        function handleTouch(e) {
            e.preventDefault();
            if (gameState !== 'playing' || !gameStarted || gameOverTriggered) return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            if (touch) {
                mouse.x = (touch.clientX - rect.left) * (canvas.width / rect.width);
                mouse.y = (touch.clientY - rect.top) * (canvas.height / rect.height);
                shoot();
            }
        }

        function handleClick(e) {
            if (gameState !== 'playing' || !gameStarted || gameOverTriggered) return;
            const rect = canvas.getBoundingClientRect();
            mouse.x = (e.clientX - rect.left) * (canvas.width / rect.width);
            mouse.y = (e.clientY - rect.top) * (canvas.height / rect.height);
            shoot();
        }

        function resizeCanvas() {
            const container = document.getElementById('container');
            containerWidth = container.clientWidth;
            containerHeight = container.clientHeight;
            if (canvas) {
                canvas.width = containerWidth;
                canvas.height = containerHeight;
            }
            hero.x = containerWidth * 0.1;
            hero.y = containerHeight / 2;
        }

        function showMenu() {
            preloadDiv.style.display = 'none';
            menuDiv.style.display = 'flex';
            gameState = 'menu';
        }

        function showSettings() {
            menuDiv.style.display = 'none';
            settingsDiv.style.display = 'flex';
            gameState = 'settings';
        }

        function hideSettings() {
            settingsDiv.style.display = 'none';
            menuDiv.style.display = 'flex';
            gameState = 'menu';
        }

        function changeVolume(val) {
            volume = parseFloat(val);
            document.getElementById('volume-label').textContent = Math.round(volume * 100) + '%';
        }

        function startGame() {
            menuDiv.style.display = 'none';
            settingsDiv.style.display = 'none';
            gameDiv.style.display = 'block';
            winDiv.style.display = 'none';
            gameState = 'playing';
            gameOverTriggered = false;
            winShown = false;
            princessAppeared = false;
            showPrincess = false;
            
            zombies = [];
            bullets = [];
            particles = [];
            celebrationParticles = [];
            score = 0;
            lastSpawn = 0;
            spawnInterval = 2000;
            weaponLevel = 1;
            weaponUpgradeCost = 3;
            totalZombiesToKill = 45;
            zombiesKilled = 0;
            gameStarted = true;
            zombieSpawnCount = 1;
            gameTime = 90;
            maxZombiesOnScreen = 5;
            
            hero.x = containerWidth * 0.1;
            hero.y = containerHeight / 2;
            
            updateHUD();
            upgradeBtn.disabled = false;
            upgradeBtn.textContent = '⬆ УЛУЧШИТЬ';
            
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                gameTime--;
                timeSpan.textContent = gameTime;
                // Таймер просто показывает время, НЕ влияет на поражение
            }, 1000);
            
            if (window.gameLoopId) cancelAnimationFrame(window.gameLoopId);
            gameLoop();
        }

        function createZombie() {
            const size = 25 + Math.random() * 12;
            const health = 8 + Math.floor(Math.random() * 5);
            const speed = 0.5 + Math.random() * 0.3;
            const z = {
                x: containerWidth + 30,
                y: 35 + Math.random() * (containerHeight - 70),
                speed: speed,
                health: health,
                maxHealth: health,
                size: size,
                color: `hsl(${120 + Math.random() * 30}, 70%, ${25 + Math.random() * 20}%)`,
                hitFlash: 0,
                wobble: Math.random() * Math.PI * 2
            };
            zombies.push(z);
        }

        function shoot() {
            if (!gameStarted || gameState !== 'playing' || gameOverTriggered) return;
            
            const now = Date.now();
            const cooldown = Math.max(100, shotCooldown - weaponLevel * 10);
            if (now - lastShot < cooldown) return;
            lastShot = now;
            
            const bulletCount = Math.min(weaponLevel, 4);
            const angle = Math.atan2(mouse.y - hero.y, mouse.x - hero.x);
            
            for (let i = 0; i < bulletCount; i++) {
                const spread = (i - (bulletCount-1)/2) * 0.12;
                const speed = 8 + weaponLevel * 0.3;
                bullets.push({
                    x: hero.x + 22,
                    y: hero.y - 3,
                    vx: Math.cos(angle + spread) * speed,
                    vy: Math.sin(angle + spread) * speed,
                    size: 4 + weaponLevel * 0.3,
                    damage: 6 + weaponLevel * 2,
                    life: 60
                });
            }
        }

        function upgradeWeapon() {
            if (zombiesKilled >= weaponUpgradeCost) {
                zombiesKilled -= weaponUpgradeCost;
                weaponLevel++;
                weaponUpgradeCost += 2;
                updateHUD();
                upgradeBtn.textContent = `⬆ УЛУЧШИТЬ (${weaponUpgradeCost})`;
                
                for (let i = 0; i < 30; i++) {
                    particles.push({
                        x: containerWidth - 40,
                        y: containerHeight - 40,
                        vx: Math.random() * 10 - 5,
                        vy: Math.random() * -10 - 3,
                        life: 30 + Math.random() * 20,
                        color: `hsl(${Math.random() * 60 + 180}, 100%, 70%)`,
                        size: 3 + Math.random() * 5,
                        isHeart: false
                    });
                }
                
                if (zombiesKilled < weaponUpgradeCost) {
                    upgradeBtn.disabled = true;
                }
            } else {
                upgradeBtn.style.backgroundColor = '#ff0000';
                setTimeout(() => {
                    upgradeBtn.style.backgroundColor = '#ff00ff';
                }, 300);
            }
        }

        function endGame(win) {
            if (gameOverTriggered) return;
            gameOverTriggered = true;
            gameStarted = false;
            gameState = 'end';
            
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
            
            if (win) {
                showPrincess = true;
                princessAppeared = true;
                winDiv.style.display = 'flex';
                winShown = true;
                
                for (let i = 0; i < 80; i++) {
                    setTimeout(() => {
                        const x = Math.random() * containerWidth;
                        const y = Math.random() * containerHeight * 0.6;
                        const colors = ['#ff00ff', '#00ffff', '#ffff00', '#ff0000', '#00ff00', '#ff6600', '#ff69b4', '#ff1493'];
                        for (let j = 0; j < 15; j++) {
                            const angle = (j / 15) * Math.PI * 2 + Math.random() * 0.3;
                            const speed = 2 + Math.random() * 5;
                            celebrationParticles.push({
                                x: x,
                                y: y,
                                vx: Math.cos(angle) * speed,
                                vy: Math.sin(angle) * speed - 1,
                                life: 50 + Math.random() * 30,
                                color: colors[Math.floor(Math.random() * colors.length)],
                                size: 3 + Math.random() * 4,
                                gravity: 0.04
                            });
                        }
                    }, i * 50);
                }
            }
        }

        function returnToMenu() {
            winDiv.style.display = 'none';
            gameDiv.style.display = 'none';
            menuDiv.style.display = 'flex';
            gameState = 'menu';
            if (window.gameLoopId) cancelAnimationFrame(window.gameLoopId);
            gameStarted = false;
            showPrincess = false;
            princessAppeared = false;
            winShown = false;
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        function updateHUD() {
            countSpan.textContent = zombies.length;
            totalSpan.textContent = totalZombiesToKill;
            levelSpan.textContent = weaponLevel;
            scoreSpan.textContent = zombiesKilled;
            timeSpan.textContent = gameTime;
        }

        function gameLoop() {
            if (gameState !== 'playing' && gameState !== 'end') {
                window.gameLoopId = requestAnimationFrame(gameLoop);
                return;
            }
            
            if (gameState === 'playing' && gameStarted && !gameOverTriggered) {
                updateGame();
            }
            drawGame();
            
            // ПОБЕДА ТОЛЬКО КОГДА УБИЛИ ВСЕХ 45 ЗОМБИ
            if (gameState === 'playing' && gameStarted && !gameOverTriggered &&
                zombiesKilled >= totalZombiesToKill && zombies.length === 0) {
                endGame(true);
            }
            
            window.gameLoopId = requestAnimationFrame(gameLoop);
        }

        function updateGame() {
            const now = Date.now();
            
            if (now - lastSpawn > spawnInterval && zombies.length < maxZombiesOnScreen) {
                const count = Math.min(zombieSpawnCount, maxZombiesOnScreen - zombies.length);
                for (let i = 0; i < count; i++) {
                    createZombie();
                }
                lastSpawn = now;
                
                if (zombiesKilled > 0 && zombiesKilled % 8 === 0 && zombieSpawnCount < 3) {
                    zombieSpawnCount += 0.3;
                    spawnInterval = Math.max(1500, spawnInterval - 80);
                }
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx;
                b.y += b.vy;
                b.life--;
                if (b.life <= 0 || b.x < -20 || b.x > containerWidth + 20 || 
                    b.y < -20 || b.y > containerHeight + 20) {
                    bullets.splice(i, 1);
                    continue;
                }
            }

            for (let i = zombies.length - 1; i >= 0; i--) {
                const z = zombies[i];
                z.x -= z.speed;
                z.wobble += 0.05;
                z.y += Math.sin(z.wobble) * 0.15;
                z.y = Math.max(25, Math.min(containerHeight - 25, z.y));
                if (z.hitFlash > 0) z.hitFlash--;
                
                if (z.x < -50) {
                    zombies.splice(i, 1);
                    continue;
                }
                
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    const dx = b.x - z.x;
                    const dy = b.y - z.y;
                    if (Math.hypot(dx, dy) < z.size/2 + b.size) {
                        z.health -= b.damage;
                        z.hitFlash = 5;
                        bullets.splice(j, 1);
                        createHitEffect(b.x, b.y, '#ffff00');
                        
                        if (z.health <= 0) {
                            zombies.splice(i, 1);
                            zombiesKilled++;
                            score += 50;
                            updateHUD();
                            createHitEffect(z.x, z.y, '#ff4444');
                            
                            if (zombiesKilled >= weaponUpgradeCost) {
                                upgradeBtn.disabled = false;
                            }
                        }
                        break;
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                if (!p.isHeart) p.vy += 0.08;
                p.life--;
                if (p.life <= 0) particles.splice(i, 1);
            }

            updateHUD();
        }

        function createHitEffect(x, y, color = '#ffff00') {
            for (let i = 0; i < 12; i++) {
                particles.push({
                    x: x + Math.random() * 16 - 8,
                    y: y + Math.random() * 16 - 8,
                    vx: Math.random() * 6 - 3,
                    vy: Math.random() * 6 - 4,
                    life: 15 + Math.random() * 15,
                    color: color,
                    size: 2 + Math.random() * 4,
                    isHeart: false
                });
            }
        }

        function drawGame() {
            ctx.clearRect(0, 0, containerWidth, containerHeight);
            
            const grad = ctx.createLinearGradient(0, 0, 0, containerHeight);
            grad.addColorStop(0, '#0a001a');
            grad.addColorStop(0.2, '#1a0033');
            grad.addColorStop(0.5, '#2d004d');
            grad.addColorStop(0.8, '#1a0033');
            grad.addColorStop(1, '#0a001a');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, containerWidth, containerHeight);
            
            for (let i = 0; i < 50; i++) {
                const sx = (i * 137.5 + 42) % containerWidth;
                const sy = (i * 97.3 + 13) % (containerHeight * 0.5);
                const brightness = 0.3 + Math.sin(i * 1.7 + Date.now() * 0.001) * 0.3;
                ctx.fillStyle = `rgba(255, 255, 255, ${brightness * 0.5})`;
                ctx.beginPath();
                ctx.arc(sx, sy, 1 + Math.random(), 0, Math.PI * 2);
                ctx.fill();
            }
            
            const moonX = containerWidth - 55;
            const moonY = 50;
            const glow = ctx.createRadialGradient(moonX, moonY, 10, moonX, moonY, 60);
            glow.addColorStop(0, 'rgba(255, 200, 100, 0.2)');
            glow.addColorStop(0.5, 'rgba(255, 200, 100, 0.1)');
            glow.addColorStop(1, 'rgba(255, 200, 100, 0)');
            ctx.fillStyle = glow;
            ctx.beginPath();
            ctx.arc(moonX, moonY, 60, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX, moonY, 22, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 220, 150, 0.3)';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(moonX, moonY, 15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 240, 200, 0.5)';
            ctx.fill();
            
            for (let i = 0; i < 8; i++) {
                const x = i * 70 + 15;
                const h = 30 + Math.random() * 45;
                ctx.fillStyle = 'rgba(20, 10, 30, 0.5)';
                ctx.fillRect(x, containerHeight - h - 10, 30, h);
                for (let wy = 0; wy < h - 8; wy += 15) {
                    if (Math.random() > 0.5) {
                        ctx.fillStyle = `rgba(255, 200, 50, ${0.05 + Math.random() * 0.1})`;
                        ctx.fillRect(x + 6, containerHeight - h - 8 + wy, 6, 6);
                    }
                }
            }
            
            for (let i = 0; i < 3; i++) {
                const x = (i * 180 + Date.now() * 0.005) % (containerWidth + 150) - 75;
                const fog = ctx.createRadialGradient(x, containerHeight - 15, 5, x, containerHeight - 5, 120);
                fog.addColorStop(0, 'rgba(80, 50, 120, 0.08)');
                fog.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = fog;
                ctx.fillRect(x - 120, containerHeight - 140, 240, 140);
            }

            for (const p of particles) {
                ctx.globalAlpha = Math.min(1, p.life / 15);
                if (p.isHeart) {
                    ctx.font = `${p.size * 1.8}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillStyle = p.color;
                    ctx.fillText('❤️', p.x, p.y);
                } else {
                    ctx.fillStyle = p.color;
                    ctx.shadowColor = p.color;
                    ctx.shadowBlur = 5;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size || 3, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.globalAlpha = 1;
            }

            for (const b of bullets) {
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 12;
                ctx.fillStyle = '#00ffff';
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                const glow2 = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.size * 2);
                glow2.addColorStop(0, 'rgba(0, 255, 255, 0.3)');
                glow2.addColorStop(1, 'rgba(0, 255, 255, 0)');
                ctx.fillStyle = glow2;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.size * 2, 0, Math.PI * 2);
                ctx.fill();
            }

            for (const z of zombies) {
                ctx.shadowColor = '#00ff00';
                ctx.shadowBlur = 8;
                const gradZ = ctx.createRadialGradient(z.x - 5, z.y - 5, 2, z.x, z.y, z.size/2);
                const col = z.hitFlash > 0 ? '#ffffff' : z.color;
                gradZ.addColorStop(0, col);
                gradZ.addColorStop(1, z.hitFlash > 0 ? '#ff6666' : `hsl(${120 + Math.random() * 30}, 60%, 15%)`);
                ctx.fillStyle = gradZ;
                ctx.beginPath();
                ctx.arc(z.x, z.y, z.size/2, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                const eyeS = z.size * 0.13;
                ctx.fillStyle = '#ff0000';
                ctx.shadowColor = '#ff0000';
                ctx.shadowBlur = 8;
                ctx.beginPath();
                ctx.arc(z.x - z.size * 0.2, z.y - z.size * 0.08, eyeS, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(z.x + z.size * 0.2, z.y - z.size * 0.08, eyeS, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#000';
                ctx.shadowBlur = 0;
                ctx.beginPath();
                ctx.arc(z.x - z.size * 0.23, z.y - z.size * 0.12, eyeS * 0.5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(z.x + z.size * 0.17, z.y - z.size * 0.12, eyeS * 0.5, 0, Math.PI * 2);
                ctx.fill();
                const hpW = z.size * 0.7;
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(z.x - hpW/2, z.y - z.size/2 - 10, hpW, 4);
                const hp = Math.max(0, z.health / z.maxHealth);
                ctx.fillStyle = hp > 0.5 ? '#00ff00' : hp > 0.25 ? '#ffff00' : '#ff0000';
                ctx.fillRect(z.x - hpW/2, z.y - z.size/2 - 10, hpW * hp, 4);
                ctx.shadowBlur = 0;
            }

            const hx = hero.x;
            const hy = hero.y;
            
            ctx.shadowColor = '#ff00ff';
            ctx.shadowBlur = 15;
            
            const gradH = ctx.createLinearGradient(hx - 12, hy - 18, hx + 12, hy + 12);
            gradH.addColorStop(0, '#4477ff');
            gradH.addColorStop(1, '#2244aa');
            ctx.fillStyle = gradH;
            ctx.fillRect(hx - 13, hy - 19, 26, 34);
            
            ctx.shadowBlur = 12;
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.arc(hx, hy - 23, 13, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(hx - 4, hy - 25, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(hx + 4, hy - 25, 2.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(hx, hy - 20, 4.5, 0.1, Math.PI - 0.1);
            ctx.stroke();
            ctx.fillStyle = '#4a2810';
            ctx.beginPath();
            ctx.arc(hx, hy - 30, 11, Math.PI, 2 * Math.PI);
            ctx.fill();
            
            ctx.shadowBlur = 5;
            ctx.fillStyle = '#888';
            ctx.shadowColor = '#aaa';
            ctx.fillRect(hx + 11, hy - 8, 20, 4);
            ctx.fillStyle = '#666';
            ctx.fillRect(hx + 26, hy - 7, 8, 8);
            ctx.fillStyle = '#444';
            ctx.fillRect(hx + 30, hy - 5, 4, 4);
            ctx.fillStyle = '#ff6600';
            ctx.fillRect(hx + 29, hy - 4, 2, 2);
            ctx.shadowBlur = 0;
            
            if (showPrincess && princessAppeared) {
                const px = containerWidth / 2;
                const py = containerHeight / 2 - 20;
                
                const glowP = ctx.createRadialGradient(px, py, 10, px, py, 100);
                glowP.addColorStop(0, 'rgba(255, 0, 255, 0.15)');
                glowP.addColorStop(0.5, 'rgba(255, 0, 255, 0.05)');
                glowP.addColorStop(1, 'rgba(255, 0, 255, 0)');
                ctx.fillStyle = glowP;
                ctx.beginPath();
                ctx.arc(px, py, 100, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 30;
                
                const gradD = ctx.createRadialGradient(px, py + 10, 5, px, py + 20, 35);
                gradD.addColorStop(0, '#ff69b4');
                gradD.addColorStop(0.5, '#ff1493');
                gradD.addColorStop(1, '#cc0066');
                ctx.fillStyle = gradD;
                ctx.beginPath();
                ctx.moveTo(px - 22, py);
                ctx.quadraticCurveTo(px - 38, py + 38, px - 12, py + 48);
                ctx.lineTo(px + 12, py + 48);
                ctx.quadraticCurveTo(px + 38, py + 38, px + 22, py);
                ctx.fill();
                
                ctx.fillStyle = '#ffcc99';
                ctx.shadowBlur = 15;
                ctx.fillRect(px - 10, py - 24, 20, 24);
                
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.arc(px, py - 29, 13, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = '#ffd700';
                ctx.shadowColor = '#ffd700';
                ctx.shadowBlur = 20;
                ctx.beginPath();
                ctx.moveTo(px - 11, py - 36);
                ctx.lineTo(px - 7, py - 46);
                ctx.lineTo(px - 2, py - 39);
                ctx.lineTo(px, py - 48);
                ctx.lineTo(px + 2, py - 39);
                ctx.lineTo(px + 7, py - 46);
                ctx.lineTo(px + 11, py - 36);
                ctx.closePath();
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(px - 4, py - 31, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px + 4, py - 31, 2, 0, Math.PI * 2);
                ctx.fill();
                ctx.strokeStyle = '#000';
                ctx.lineWidth = 1.5;
                ctx.beginPath();
                ctx.arc(px, py - 26, 4, 0.1, Math.PI - 0.1);
                ctx.stroke();
                ctx.fillStyle = 'rgba(255, 100, 100, 0.2)';
                ctx.beginPath();
                ctx.arc(px - 8, py - 27, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.beginPath();
                ctx.arc(px + 8, py - 27, 5, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#ff00ff';
                ctx.font = '16px "Press Start 2P", system-ui';
                ctx.textAlign = 'center';
                ctx.shadowColor = '#ff00ff';
                ctx.shadowBlur = 30;
                ctx.fillText('❤️ ГЮЛЬМИРА ❤️', px, py - 72);
                ctx.shadowBlur = 0;
            }

            if (princessAppeared && celebrationParticles.length > 0) {
                for (let i = celebrationParticles.length - 1; i >= 0; i--) {
                    const f = celebrationParticles[i];
                    f.x += f.vx;
                    f.y += f.vy;
                    f.vy += f.gravity || 0.05;
                    f.life--;
                    if (f.life <= 0) {
                        celebrationParticles.splice(i, 1);
                        continue;
                    }
                    ctx.globalAlpha = Math.min(1, f.life / 20);
                    ctx.fillStyle = f.color;
                    ctx.shadowColor = f.color;
                    ctx.shadowBlur = 15;
                    ctx.beginPath();
                    ctx.arc(f.x, f.y, f.size * (f.life / 40), 0, Math.PI * 2);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }
                ctx.globalAlpha = 1;
            }
            
            if (gameState === 'playing' && gameStarted && !gameOverTriggered) {
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
                ctx.lineWidth = 1;
                ctx.setLineDash([3, 4]);
                ctx.beginPath();
                ctx.arc(mouse.x, mouse.y, 15, 0, Math.PI * 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.strokeStyle = 'rgba(255, 0, 255, 0.3)';
                ctx.lineWidth = 1.5;
                const s = 6;
                ctx.beginPath();
                ctx.moveTo(mouse.x - s, mouse.y);
                ctx.lineTo(mouse.x + s, mouse.y);
                ctx.moveTo(mouse.x, mouse.y - s);
                ctx.lineTo(mouse.x, mouse.y + s);
                ctx.stroke();
            }
        }

        window.onload = function() {
            initCanvas();
            resizeCanvas();
            
            document.getElementById('sound-slider').value = volume;
            document.getElementById('volume-label').textContent = Math.round(volume * 100) + '%';
            
            preloadDiv.style.display = 'flex';
            menuDiv.style.display = 'none';
            settingsDiv.style.display = 'none';
            gameDiv.style.display = 'none';
            winDiv.style.display = 'none';
            gameState = 'preload';
            
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('orientationchange', () => {
                setTimeout(resizeCanvas, 300);
            });
        };

        console.log('💖 Игра для Гюльмиры готова! ❤️');
        console.log('🎮 Просто тапай по экрану и стреляй в зомби!');
    </script>
</body>
</html>
