<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Избранное · Чат</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #0a0a0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-height: -webkit-fill-available;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      overflow-x: hidden;
      position: relative;
    }

    /* Анимированный фон с частицами */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(ellipse at 20% 50%, rgba(240, 193, 75, 0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 20%, rgba(0, 122, 255, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 80%, rgba(120, 80, 200, 0.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 15s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .phone-frame {
      width: 100%;
      max-width: 414px;
      height: 100vh;
      height: -webkit-fill-available;
      max-height: 896px;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: all 0.3s ease;
      z-index: 1;
      /* Матовое стекло */
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.4),
        inset 0 0 0 1px rgba(255, 255, 255, 0.05);
    }

    /* Фолбэк для старых iOS */
    @supports not (backdrop-filter: blur(40px)) {
      .phone-frame {
        background: rgba(20, 20, 30, 0.9);
      }
    }

    @media (max-width: 414px) {
      .phone-frame {
        max-height: 100vh;
        max-height: -webkit-fill-available;
      }
    }

    /* Экран блокировки */
    .lock-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 20px;
      color: white;
      will-change: transform, opacity;
      /* Матовое стекло */
      background: rgba(15, 15, 30, 0.75);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    @supports not (backdrop-filter: blur(50px)) {
      .lock-screen {
        background: rgba(15, 15, 30, 0.95);
      }
    }

    .lock-screen.unlocked {
      transform: translateY(-110%);
      opacity: 0;
      pointer-events: none;
    }

    /* Частицы на экране блокировки */
    .particles-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: rgba(240, 193, 75, 0.4);
      filter: blur(2px);
      animation: floatUp 6s linear infinite;
      will-change: transform, opacity;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(105vh) scale(0);
        opacity: 0;
      }
      10% {
        opacity: 0.6;
      }
      50% {
        opacity: 0.3;
      }
      90% {
        opacity: 0.1;
      }
      100% {
        transform: translateY(-10vh) scale(1.5);
        opacity: 0;
      }
    }

    .lock-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 300px;
    }

    .lock-icon {
      font-size: 70px;
      margin-bottom: 15px;
      color: #f0c14b;
      filter: drop-shadow(0 8px 25px rgba(240, 193, 75, 0.6));
      transition: transform 0.3s ease;
      will-change: transform;
    }

    .lock-icon.shake {
      animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 90% { transform: translateX(-8px); }
      20%, 80% { transform: translateX(8px); }
      30%, 50%, 70% { transform: translateX(-5px); }
      40%, 60% { transform: translateX(5px); }
    }

    .lock-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 5px;
      color: #f0c14b;
      text-shadow: 0 4px 20px rgba(240, 193, 75, 0.5);
      text-align: center;
    }

    .lock-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.4);
      margin-bottom: 35px;
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
    }

    .password-input {
      background: rgba(255, 255, 255, 0.06);
      border: 2px solid rgba(240, 193, 75, 0.2);
      border-radius: 20px;
      padding: 14px;
      font-size: 22px;
      width: 100%;
      text-align: center;
      color: white;
      outline: none;
      letter-spacing: 5px;
      caret-color: #f0c14b;
      transition: all 0.3s ease;
      margin-bottom: 20px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .password-input:focus {
      border-color: rgba(240, 193, 75, 0.6);
      background: rgba(255, 255, 255, 0.1);
      box-shadow: 0 0 30px rgba(240, 193, 75, 0.2);
    }

    .password-input.error {
      border-color: rgba(255, 59, 48, 0.6);
      animation: errorPulse 0.3s ease;
    }

    @keyframes errorPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    .password-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 3px;
      font-size: 16px;
    }

    .unlock-btn {
      background: linear-gradient(135deg, #f0c14b, #d4a93b);
      border: none;
      padding: 15px 40px;
      border-radius: 25px;
      font-size: 17px;
      font-weight: 700;
      color: #1a1a1a;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 8px 30px rgba(240, 193, 75, 0.5);
      text-transform: uppercase;
      letter-spacing: 1px;
      width: 100%;
      max-width: 250px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .unlock-btn:active {
      transform: scale(0.96);
    }

    .unlock-btn:disabled {
      opacity: 0.6;
      pointer-events: none;
    }

    .hint-text {
      color: rgba(255, 255, 255, 0.3);
      font-size: 11px;
      margin-top: 15px;
      letter-spacing: 1px;
      text-align: center;
    }

    /* Основной интерфейс */
    .app-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      transition: background 0.3s ease;
      background: transparent;
    }

    .chat-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 19px;
      color: #fff;
      z-index: 5;
      min-height: 56px;
      /* Матовое стекло */
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    @supports not (backdrop-filter: blur(40px)) {
      .chat-header {
        background: rgba(30, 30, 40, 0.8);
      }
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
    }

    .icon-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: rgba(255, 255, 255, 0.8);
      flex-shrink: 0;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .icon-btn:active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(0.92);
    }

    .chat-title {
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Сообщения */
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 15px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      background: transparent;
    }

    .message-bubble {
      max-width: 75%;
      padding: 10px 14px;
      border-radius: 18px;
      font-size: 15px;
      line-height: 1.4;
      word-wrap: break-word;
      overflow-wrap: break-word;
      color: #fff;
      align-self: flex-start;
      animation: messageSlideIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      will-change: transform, opacity;
      /* Матовое стекло */
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    @keyframes messageSlideIn {
      from { opacity: 0; transform: translateY(15px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message-bubble.sent {
      background: rgba(0, 122, 255, 0.3);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      align-self: flex-end;
      border: 1px solid rgba(255, 255, 255, 0.12);
    }

    .message-bubble.system {
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: rgba(255, 255, 255, 0.5);
      align-self: center;
      font-style: italic;
      font-size: 12px;
      border-radius: 12px;
      padding: 6px 14px;
      border: none;
      max-width: 90%;
    }

    /* Медиа в сообщениях */
    .media-message {
      max-width: 85%;
      padding: 6px;
      border-radius: 16px;
      animation: messageSlideIn 0.35s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      /* Матовое стекло */
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }

    .media-message img,
    .media-message video {
      width: 100%;
      border-radius: 12px;
      display: block;
      max-height: 300px;
      object-fit: cover;
      background: rgba(0, 0, 0, 0.3);
    }

    .media-message video {
      background: #000;
    }

    .media-info {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 4px 2px;
      gap: 8px;
    }

    .media-timestamp {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    .media-actions {
      display: flex;
      gap: 6px;
    }

    .download-btn,
    .view-btn {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 5px 10px;
      border-radius: 10px;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 3px;
      transition: all 0.2s ease;
    }

    .download-btn:active,
    .view-btn:active {
      background: rgba(255, 255, 255, 0.2);
      transform: scale(0.95);
    }

    /* Поле ввода */
    .input-area {
      display: flex;
      padding: 10px 12px;
      gap: 8px;
      align-items: center;
      z-index: 5;
      min-height: 60px;
      /* Матовое стекло */
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .attach-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: rgba(52, 199, 89, 0.2);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(52, 199, 89, 0.3);
      color: #34c759;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(52, 199, 89, 0.2);
    }

    .attach-btn:active {
      transform: scale(0.9) rotate(90deg);
      background: rgba(52, 199, 89, 0.3);
    }

    .message-input {
      flex: 1;
      padding: 12px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      font-size: 15px;
      outline: none;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: #fff;
      transition: all 0.2s ease;
      min-width: 0;
    }

    .message-input:focus {
      border-color: rgba(255, 255, 255, 0.25);
      background: rgba(255, 255, 255, 0.1);
    }

    .message-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .send-btn {
      background: rgba(0, 122, 255, 0.3);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: white;
      font-size: 15px;
      font-weight: 600;
      padding: 12px 20px;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .send-btn:active {
      background: rgba(0, 122, 255, 0.5);
      transform: scale(0.94);
    }

    .send-btn:disabled {
      opacity: 0.4;
      pointer-events: none;
    }

    /* Меню вложений */
    .attach-menu {
      position: absolute;
      bottom: 70px;
      left: 12px;
      border-radius: 20px;
      padding: 10px;
      display: flex;
      gap: 8px;
      z-index: 15;
      transform: scale(0);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      transform-origin: bottom left;
      /* Матовое стекло */
      background: rgba(30, 30, 40, 0.8);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.3);
    }

    .attach-menu.open {
      transform: scale(1);
      opacity: 1;
    }

    .attach-option {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 10px 16px;
      border-radius: 14px;
      cursor: pointer;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .attach-option:active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(0.95);
    }

    /* Оверлеи */
    .settings-overlay,
    .menu-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 12;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      background: rgba(0, 0, 0, 0.3);
      backdrop-filter: blur(5px);
      -webkit-backdrop-filter: blur(5px);
    }

    .settings-overlay.visible,
    .menu-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    /* Модальное окно настроек */
    .settings-modal {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      border-top-left-radius: 24px;
      border-top-right-radius: 24px;
      padding: 20px 16px 30px;
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.3);
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 16px;
      color: #fff;
      max-height: 80vh;
      overflow-y: auto;
      /* Матовое стекло */
      background: rgba(30, 30, 40, 0.85);
      backdrop-filter: blur(40px) saturate(200%);
      -webkit-backdrop-filter: blur(40px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .settings-modal.open {
      transform: translateY(0);
    }

    .settings-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      align-self: center;
      margin-bottom: 5px;
    }

    .settings-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
    }

    .theme-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    @media (max-width: 360px) {
      .theme-options {
        grid-template-columns: 1fr;
      }
    }

    .theme-btn {
      padding: 12px;
      border-radius: 16px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 14px;
      color: #fff;
      text-align: center;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .theme-btn:active {
      transform: scale(0.95);
    }

    .theme-btn.active {
      background: rgba(0, 122, 255, 0.4);
      border-color: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
    }

    .close-settings {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 14px;
      border-radius: 14px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: all 0.2s ease;
      font-size: 15px;
      text-align: center;
    }

    .close-settings:active {
      background: rgba(255, 255, 255, 0.15);
    }

    /* Toast */
    .toast {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: white;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 14px;
      z-index: 50;
      transition: transform 0.3s ease;
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    #fileInput {
      display: none;
    }

    /* Тема Light */
    .phone-frame.theme-light .chat-header {
      background: rgba(255, 255, 255, 0.15);
      color: #1a1a1a;
    }

    .phone-frame.theme-light .message-bubble {
      background: rgba(0, 0, 0, 0.04);
      color: #1a1a1a;
      border-color: rgba(0, 0, 0, 0.06);
    }

    .phone-frame.theme-light .message-bubble.sent {
      background: rgba(0, 122, 255, 0.2);
      color: #1a1a1a;
    }

    .phone-frame.theme-light .message-input {
      background: rgba(255, 255, 255, 0.2);
      color: #1a1a1a;
      border-color: rgba(0, 0, 0, 0.08);
    }

    .phone-frame.theme-light .message-input::placeholder {
      color: rgba(0, 0, 0, 0.25);
    }

    .phone-frame.theme-light .icon-btn {
      background: rgba(0, 0, 0, 0.04);
      color: #1a1a1a;
    }

    .phone-frame.theme-light .settings-modal {
      background: rgba(255, 255, 255, 0.9);
      color: #1a1a1a;
    }

    .phone-frame.theme-light .theme-btn {
      background: rgba(0, 0, 0, 0.03);
      color: #1a1a1a;
      border-color: rgba(0, 0, 0, 0.1);
    }

    /* Тема Gold */
    .phone-frame.theme-gold .send-btn,
    .phone-frame.theme-gold .theme-btn.active {
      background: rgba(212, 169, 59, 0.4);
      border-color: rgba(240, 193, 75, 0.4);
    }

    .phone-frame.theme-gold .message-bubble.sent {
      background: rgba(212, 169, 59, 0.25);
      border-color: rgba(240, 193, 75, 0.25);
    }

    .phone-frame.theme-gold .attach-btn {
      background: rgba(212, 169, 59, 0.2);
      border-color: rgba(240, 193, 75, 0.3);
      color: #d4a93b;
    }

    @media (max-height: 700px) {
      .lock-icon { font-size: 55px; }
      .lock-title { font-size: 22px; }
      .password-input { font-size: 20px; padding: 12px; }
      .unlock-btn { padding: 12px 30px; font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="phone-frame theme-dark" id="phoneFrame">
    <!-- Экран блокировки -->
    <div class="lock-screen" id="lockScreen">
      <div class="particles-container" id="particlesContainer"></div>
      <div class="lock-content">
        <div class="lock-icon" id="lockIcon">🔒</div>
        <div class="lock-title">Избранное</div>
        <div class="lock-subtitle">Защищённый чат</div>
        <input type="password" class="password-input" id="passwordInput" placeholder="Пароль" maxlength="6" inputmode="numeric" autocomplete="off">
        <button class="unlock-btn" id="unlockBtn">Войти</button>
        <div class="hint-text">Подсказка: 1983</div>
      </div>
    </div>

    <!-- Оверлеи -->
    <div class="menu-overlay" id="menuOverlay"></div>
    <div class="settings-overlay" id="settingsOverlay"></div>

    <!-- Основной интерфейс -->
    <div class="app-screen" id="appScreen">
      <div class="chat-header">
        <div class="header-left">
          <button class="icon-btn" id="lockChatBtn" aria-label="Заблокировать">🔒</button>
          <div class="chat-title">⭐ Избранное</div>
        </div>
        <button class="icon-btn" id="settingsIcon" aria-label="Настройки">⚙️</button>
      </div>

      <div class="messages-container" id="messagesContainer">
        <div class="message-bubble system">💬 Чат защищён паролем</div>
        <div class="message-bubble">Привет! Добро пожаловать в избранное ✨</div>
        <div class="message-bubble sent">Отлично! Здесь все важные файлы 🔐</div>
      </div>

      <!-- Меню вложений -->
      <div class="attach-menu" id="attachMenu">
        <button class="attach-option" id="attachPhotoBtn">🖼️ Фото</button>
        <button class="attach-option" id="attachVideoBtn">🎬 Видео</button>
      </div>

      <div class="input-area">
        <button class="attach-btn" id="attachBtn" aria-label="Прикрепить">+</button>
        <input type="text" class="message-input" id="messageInput" placeholder="Сообщение..." autocomplete="off" maxlength="1000">
        <button class="send-btn" id="sendBtn">Отпр.</button>
      </div>
    </div>

    <!-- Скрытый input -->
    <input type="file" id="fileInput" accept="image/*,video/*">

    <!-- Модальное окно настроек -->
    <div class="settings-modal" id="settingsModal">
      <div class="settings-handle"></div>
      <div class="settings-title">🎨 Оформление</div>
      <div class="theme-options">
        <button class="theme-btn" data-theme="light">☀️ Светлая</button>
        <button class="theme-btn active" data-theme="dark">🌙 Тёмная</button>
        <button class="theme-btn" data-theme="gold">✨ Золотая</button>
      </div>
      <button class="close-settings" id="closeSettingsBtn">Закрыть</button>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>
  </div>

  <script>
    (function() {
      'use strict';

      // DOM элементы
      const lockScreen = document.getElementById('lockScreen');
      const lockIcon = document.getElementById('lockIcon');
      const passwordInput = document.getElementById('passwordInput');
      const unlockBtn = document.getElementById('unlockBtn');
      const lockChatBtn = document.getElementById('lockChatBtn');
      const settingsIcon = document.getElementById('settingsIcon');
      const settingsModal = document.getElementById('settingsModal');
      const settingsOverlay = document.getElementById('settingsOverlay');
      const closeSettingsBtn = document.getElementById('closeSettingsBtn');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const messagesContainer = document.getElementById('messagesContainer');
      const phoneFrame = document.getElementById('phoneFrame');
      const particlesContainer = document.getElementById('particlesContainer');
      const themeButtons = document.querySelectorAll('.theme-btn');
      const attachBtn = document.getElementById('attachBtn');
      const attachMenu = document.getElementById('attachMenu');
      const menuOverlay = document.getElementById('menuOverlay');
      const fileInput = document.getElementById('fileInput');
      const toast = document.getElementById('toast');

      const CORRECT_PASSWORD = '1983';
      const STORAGE_KEY = 'favoriteChatMedia';
      
      let isLocked = true;
      let isProcessingUnlock = false;
      let isSendingMessage = false;
      let particles = [];
      let savedMedia = [];
      let mediaLoaded = false;

      // Toast
      let toastTimer;
      function showToast(message, duration = 2000) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => {
          toast.classList.remove('show');
        }, duration);
      }

      // Частицы
      function createParticles() {
        const fragment = document.createDocumentFragment();
        const sizes = [2, 3, 4, 5];
        
        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          const size = sizes[Math.floor(Math.random() * sizes.length)];
          particle.style.width = size + 'px';
          particle.style.height = size + 'px';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 6 + 's';
          particle.style.animationDuration = (4 + Math.random() * 5) + 's';
          fragment.appendChild(particle);
          particles.push(particle);
        }
        
        particlesContainer.appendChild(fragment);
      }

      function clearParticles() {
        particles.forEach(p => p.remove());
        particles = [];
      }

      // Пароль
      function checkPassword() {
        if (isProcessingUnlock || !isLocked) return;
        
        const entered = passwordInput.value.trim();
        
        if (entered === CORRECT_PASSWORD) {
          isProcessingUnlock = true;
          unlockBtn.disabled = true;
          
          lockScreen.classList.add('unlocked');
          isLocked = false;
          passwordInput.value = '';
          passwordInput.classList.remove('error');
          
          // Загружаем медиа только при первой разблокировке
          if (!mediaLoaded) {
            loadSavedMedia();
            mediaLoaded = true;
          }
          
          setTimeout(() => {
            isProcessingUnlock = false;
            unlockBtn.disabled = false;
            messageInput.focus();
          }, 500);
        } else {
          lockIcon.classList.add('shake');
          passwordInput.classList.add('error');
          passwordInput.value = '';
          passwordInput.placeholder = 'Неверно';
          
          setTimeout(() => {
            lockIcon.classList.remove('shake');
            passwordInput.classList.remove('error');
            passwordInput.placeholder = 'Пароль';
          }, 500);
        }
      }

      function lockChat() {
        if (isLocked) return;
        
        isLocked = true;
        lockScreen.classList.remove('unlocked');
        passwordInput.value = '';
        passwordInput.classList.remove('error');
        closeSettings();
        closeAttachMenu();
        
        setTimeout(() => {
          passwordInput.focus();
        }, 300);
      }

      // Меню вложений
      function openAttachMenu() {
        attachMenu.classList.add('open');
        menuOverlay.classList.add('visible');
      }

      function closeAttachMenu() {
        attachMenu.classList.remove('open');
        menuOverlay.classList.remove('visible');
      }

      function toggleAttachMenu() {
        if (attachMenu.classList.contains('open')) {
          closeAttachMenu();
        } else {
          openAttachMenu();
        }
      }

      // Выбор файла
      function selectFile(type) {
        fileInput.accept = type === 'photo' ? 'image/*' : 'video/*';
        if (type === 'video') {
          fileInput.setAttribute('capture', 'environment');
        } else {
          fileInput.removeAttribute('capture');
        }
        fileInput.click();
        closeAttachMenu();
      }

      // Обработка файла
      function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        // Проверка размера (макс 50MB)
        if (file.size > 50 * 1024 * 1024) {
          showToast('⚠️ Файл слишком большой (макс 50MB)');
          fileInput.value = '';
          return;
        }

        showToast('⏳ Загрузка...');
        
        const reader = new FileReader();
        reader.onload = function(e) {
          const dataUrl = e.target.result;
          const mediaType = file.type.startsWith('image/') ? 'photo' : 'video';
          
          const mediaItem = {
            id: Date.now(),
            type: mediaType,
            dataUrl: dataUrl,
            fileName: file.name,
            timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
          };

          // Сохраняем
          savedMedia.push(mediaItem);
          saveMediaToStorage();
          
          // Отображаем
          addMediaMessage(mediaItem, true);
          showToast('✅ Добавлено в избранное');
        };
        
        reader.onerror = function() {
          showToast('❌ Ошибка загрузки файла');
        };
        
        reader.readAsDataURL(file);
        fileInput.value = '';
      }

      // Добавление медиа в чат
      function addMediaMessage(mediaItem, isSent = true) {
        const mediaDiv = document.createElement('div');
        mediaDiv.classList.add('media-message');
        mediaDiv.style.alignSelf = isSent ? 'flex-end' : 'flex-start';
        mediaDiv.dataset.mediaId = mediaItem.id;

        if (mediaItem.type === 'photo') {
          const img = document.createElement('img');
          img.src = mediaItem.dataUrl;
          img.alt = mediaItem.fileName || 'Изображение';
          img.loading = 'lazy';
          img.onclick = function() {
            window.open(mediaItem.dataUrl, '_blank');
          };
          mediaDiv.appendChild(img);
        } else {
          const video = document.createElement('video');
          video.src = mediaItem.dataUrl;
          video.controls = true;
          video.playsInline = true;
          video.preload = 'metadata';
          video.poster = '';
          mediaDiv.appendChild(video);
        }

        // Информация и кнопки
        const infoDiv = document.createElement('div');
        infoDiv.classList.add('media-info');
        
        const timestamp = document.createElement('span');
        timestamp.classList.add('media-timestamp');
        timestamp.textContent = mediaItem.timestamp || '';
        
        const actionsDiv = document.createElement('div');
        actionsDiv.classList.add('media-actions');

        const viewBtn = document.createElement('button');
        viewBtn.classList.add('view-btn');
        viewBtn.innerHTML = '👁️';
        viewBtn.title = 'Открыть';
        viewBtn.onclick = function(e) {
          e.stopPropagation();
          window.open(mediaItem.dataUrl, '_blank');
        };

        const downloadBtn = document.createElement('button');
        downloadBtn.classList.add('download-btn');
        downloadBtn.innerHTML = '💾 Скачать';
        downloadBtn.onclick = function(e) {
          e.stopPropagation();
          downloadMedia(mediaItem);
        };

        actionsDiv.appendChild(viewBtn);
        actionsDiv.appendChild(downloadBtn);
        
        infoDiv.appendChild(timestamp);
        infoDiv.appendChild(actionsDiv);
        mediaDiv.appendChild(infoDiv);

        messagesContainer.appendChild(mediaDiv);
        
        requestAnimationFrame(() => {
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
      }

      // Скачивание медиа
      function downloadMedia(mediaItem) {
        const extension = mediaItem.type === 'photo' ? 'jpg' : 'mp4';
        const fileName = mediaItem.fileName || `favorite_${mediaItem.id}.${extension}`;
        
        // Для iOS используем другой подход
        if (/iPhone|iPad|iPod/.test(navigator.userAgent)) {
          // Открываем в новой вкладке (пользователь может сохранить оттуда)
          const newWindow = window.open('');
          if (newWindow) {
            newWindow.document.write(`
              <html>
                <head><title>Скачать</title></head>
                <body style="margin:0;display:flex;align-items:center;justify-content:center;background:#000;">
                  ${mediaItem.type === 'photo' 
                    ? `<img src="${mediaItem.dataUrl}" style="max-width:100%;max-height:100vh;" />`
                    : `<video src="${mediaItem.dataUrl}" controls autoplay style="max-width:100%;max-height:100vh;"></video>`
                  }
                  <div style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.8);color:white;padding:10px 20px;border-radius:20px;font-family:sans-serif;">
                    Нажмите и удерживайте, чтобы сохранить
                  </div>
                </body>
              </html>
            `);
          }
        } else {
          const link = document.createElement('a');
          link.href = mediaItem.dataUrl;
          link.download = fileName;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        }
        
        showToast('📥 Открыто для сохранения');
      }

      // Текстовое сообщение
      function sendMessage() {
        if (isSendingMessage) return;
        
        const text = messageInput.value.trim();
        if (!text) return;

        isSendingMessage = true;
        sendBtn.disabled = true;
        closeAttachMenu();

        const messageDiv = document.createElement('div');
        messageDiv.classList.add('message-bubble', 'sent');
        messageDiv.textContent = text;
        messagesContainer.appendChild(messageDiv);
        messageInput.value = '';
        
        requestAnimationFrame(() => {
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });

        setTimeout(() => {
          const replyDiv = document.createElement('div');
          replyDiv.classList.add('message-bubble');
          replyDiv.textContent = getRandomReply();
          messagesContainer.appendChild(replyDiv);
          
          requestAnimationFrame(() => {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
          });
          
          isSendingMessage = false;
          sendBtn.disabled = false;
          messageInput.focus();
        }, 1000 + Math.random() * 1000);
      }

      function getRandomReply() {
        const replies = [
          'Сообщение сохранено ✨',
          'Принято! 🔒',
          'В избранном 📌',
          'Отличная мысль 💡',
          'Запомню это 📝',
          'Понял 👌'
        ];
        return replies[Math.floor(Math.random() * replies.length)];
      }

      // Настройки
      function openSettings() {
        settingsModal.classList.add('open');
        settingsOverlay.classList.add('visible');
      }

      function closeSettings() {
        settingsModal.classList.remove('open');
        settingsOverlay.classList.remove('visible');
      }

      function toggleSettings() {
        if (settingsModal.classList.contains('open')) {
          closeSettings();
        } else {
          openSettings();
        }
      }

      function applyTheme(theme) {
        phoneFrame.className = 'phone-frame';
        if (theme === 'light') phoneFrame.classList.add('theme-light');
        else if (theme === 'gold') phoneFrame.classList.add('theme-gold');
        else phoneFrame.classList.add('theme-dark');
        
        themeButtons.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.theme === theme);
        });
      }

      // Работа с localStorage
      function saveMediaToStorage() {
        try {
          // Сохраняем только последние 20 медиа для экономии места
          const toSave = savedMedia.slice(-20);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(toSave));
        } catch (e) {
          showToast('⚠️ Не удалось сохранить (мало места)');
        }
      }

      function loadSavedMedia() {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            savedMedia = JSON.parse(saved);
            // Очищаем существующие медиа-сообщения
            const existingMedia = messagesContainer.querySelectorAll('.media-message');
            existingMedia.forEach(el => el.remove());
            
            // Добавляем сохранённые
            savedMedia.forEach(item => {
              addMediaMessage(item, true);
            });
          }
        } catch (e) {
          savedMedia = [];
          console.warn('Ошибка загрузки медиа:', e);
        }
      }

      // Обработчики
      unlockBtn.addEventListener('click', (e) => {
        e.preventDefault();
        checkPassword();
      });

      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          checkPassword();
        }
      });

      lockChatBtn.addEventListener('click', (e) => {
        e.preventDefault();
        lockChat();
      });

      settingsIcon.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggleSettings();
      });

      closeSettingsBtn.addEventListener('click', (e) => {
        e.preventDefault();
        closeSettings();
      });

      settingsOverlay.addEventListener('click', (e) => {
        e.preventDefault();
        closeSettings();
      });

      settingsModal.addEventListener('click', (e) => e.stopPropagation());

      attachBtn.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        toggleAttachMenu();
      });

      menuOverlay.addEventListener('click', (e) => {
        e.preventDefault();
        closeAttachMenu();
      });

      document.getElementById('attachPhotoBtn').addEventListener('click', (e) => {
        e.preventDefault();
        selectFile('photo');
      });

      document.getElementById('attachVideoBtn').addEventListener('click', (e) => {
        e.preventDefault();
        selectFile('video');
      });

      fileInput.addEventListener('change', handleFileSelect);

      sendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        sendMessage();
      });

      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      themeButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          applyTheme(btn.dataset.theme);
        });
      });

      // iOS
      document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
      
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });

      // Глобальный клик для закрытия меню
      document.addEventListener('click', (e) => {
        if (!attachMenu.contains(e.target) && e.target !== attachBtn) {
          closeAttachMenu();
        }
        if (!settingsModal.contains(e.target) && e.target !== settingsIcon) {
          closeSettings();
        }
      });

      // Инициализация
      createParticles();
      passwordInput.focus();

      window.addEventListener('beforeunload', () => {
        clearParticles();
      });

    })();
  </script>
</body>
</html>
