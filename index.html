<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>AI Бот · Диалог</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
      height: -webkit-fill-available;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
      overflow: hidden;
    }

    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      transition: all 1s ease;
      background: 
        radial-gradient(ellipse at 30% 20%, rgba(100, 100, 255, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 70% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 0, 0, 0) 0%, #0a0a14 100%);
    }

    .phone-frame {
      width: 100vw;
      height: 100vh;
      height: -webkit-fill-available;
      max-width: 100%;
      max-height: 100%;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 1;
      background: transparent;
    }

    .lock-screen {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
      color: white;
      will-change: transform, opacity;
      background: rgba(10, 10, 20, 0.85);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
    }

    .lock-screen.unlocked {
      transform: translateY(-110%);
      opacity: 0;
      pointer-events: none;
    }

    .particles-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      filter: blur(1.5px);
      animation: floatUp var(--duration) linear infinite;
      animation-delay: var(--delay);
      will-change: transform, opacity;
      opacity: 0;
    }

    @keyframes floatUp {
      0% { transform: translateY(105vh) scale(0); opacity: 0; }
      15% { opacity: var(--max-opacity); }
      50% { opacity: calc(var(--max-opacity) * 0.6); }
      85% { opacity: calc(var(--max-opacity) * 0.2); }
      100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
    }

    .lock-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 320px;
    }

    .lock-icon {
      font-size: 80px;
      margin-bottom: 20px;
      filter: drop-shadow(0 10px 30px rgba(0, 180, 255, 0.7));
      transition: transform 0.3s ease;
      animation: lockPulse 3s ease-in-out infinite;
    }

    @keyframes lockPulse {
      0%, 100% { transform: scale(1); filter: drop-shadow(0 10px 30px rgba(0, 180, 255, 0.5)); }
      50% { transform: scale(1.05); filter: drop-shadow(0 15px 40px rgba(0, 180, 255, 0.8)); }
    }

    .lock-icon.shake {
      animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 90% { transform: translateX(-10px); }
      20%, 80% { transform: translateX(10px); }
      30%, 50%, 70% { transform: translateX(-6px); }
      40%, 60% { transform: translateX(6px); }
    }

    .lock-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #00b4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: none;
      text-align: center;
    }

    .lock-subtitle {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.45);
      margin-bottom: 40px;
      letter-spacing: 3px;
      text-transform: uppercase;
      text-align: center;
    }

    .password-input {
      background: rgba(255, 255, 255, 0.07);
      border: 2px solid rgba(0, 180, 255, 0.3);
      border-radius: 16px;
      padding: 16px;
      font-size: 24px;
      width: 100%;
      text-align: center;
      color: white;
      outline: none;
      letter-spacing: 6px;
      caret-color: #00b4ff;
      transition: all 0.3s ease;
      margin-bottom: 24px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .password-input:focus {
      border-color: rgba(0, 180, 255, 0.6);
      background: rgba(255, 255, 255, 0.12);
      box-shadow: 0 0 40px rgba(0, 180, 255, 0.25);
    }

    .password-input.error {
      border-color: rgba(255, 69, 58, 0.6);
      animation: errorPulse 0.4s ease;
    }

    @keyframes errorPulse {
      0%, 100% { transform: scale(1); }
      30% { transform: scale(1.04); }
      60% { transform: scale(0.98); }
    }

    .password-input::placeholder {
      color: rgba(255, 255, 255, 0.3);
      letter-spacing: 4px;
      font-size: 17px;
    }

    .unlock-btn {
      background: linear-gradient(135deg, #00b4ff, #7b2fff);
      border: none;
      padding: 16px 45px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: 700;
      color: white;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 10px 35px rgba(0, 180, 255, 0.4);
      text-transform: uppercase;
      letter-spacing: 2px;
      width: 100%;
      max-width: 260px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .unlock-btn:active {
      transform: scale(0.95);
      box-shadow: 0 5px 20px rgba(0, 180, 255, 0.3);
    }

    .unlock-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .app-screen {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
      background: transparent;
    }

    .chat-header {
      padding: env(safe-area-inset-top, 12px) 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-weight: 600;
      font-size: 19px;
      z-index: 5;
      min-height: 56px;
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      transition: all 0.3s ease;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 19px;
      cursor: pointer;
      transition: all 0.2s ease;
      color: rgba(255, 255, 255, 0.85);
      flex-shrink: 0;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .icon-btn:active {
      background: rgba(255, 255, 255, 0.18);
      transform: scale(0.9);
    }

    .chat-title {
      font-weight: 600;
      letter-spacing: 0.5px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      background: linear-gradient(135deg, #00b4ff, #7b2fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      background: transparent;
      scroll-behavior: smooth;
    }

    .message-bubble {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 20px;
      font-size: 16px;
      line-height: 1.45;
      word-wrap: break-word;
      overflow-wrap: break-word;
      color: #fff;
      align-self: flex-start;
      animation: messageSlideIn 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.2);
      will-change: transform, opacity;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(255, 255, 255, 0.06);
      white-space: pre-wrap;
    }

    @keyframes messageSlideIn {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message-bubble.sent {
      background: linear-gradient(135deg, rgba(0, 180, 255, 0.35), rgba(123, 47, 255, 0.35));
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      color: white;
      align-self: flex-end;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .message-bubble.system {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      color: rgba(255, 255, 255, 0.5);
      align-self: center;
      font-style: italic;
      font-size: 13px;
      border-radius: 14px;
      padding: 8px 16px;
      border: none;
      max-width: 85%;
    }

    .message-bubble.ai {
      background: rgba(0, 200, 150, 0.12);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      border: 1px solid rgba(0, 200, 150, 0.2);
    }

    .message-bubble.loading {
      background: rgba(255, 255, 255, 0.05);
      color: rgba(255, 255, 255, 0.5);
      font-style: italic;
    }

    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 4px 0;
    }

    .typing-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.5);
      animation: typingBounce 1.4s infinite;
    }

    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .input-area {
      display: flex;
      padding: 10px 14px;
      padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
      gap: 10px;
      align-items: center;
      z-index: 5;
      min-height: 60px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
    }

    .message-input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      font-size: 16px;
      outline: none;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      color: #fff;
      transition: all 0.2s ease;
      min-width: 0;
    }

    .message-input:focus {
      border-color: rgba(0, 180, 255, 0.4);
      background: rgba(255, 255, 255, 0.12);
    }

    .message-input::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }

    .send-btn {
      background: linear-gradient(135deg, #00b4ff, #7b2fff);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: none;
      color: white;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 22px;
      border-radius: 24px;
      cursor: pointer;
      transition: all 0.2s ease;
      white-space: nowrap;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(0, 180, 255, 0.3);
    }

    .send-btn:active {
      transform: scale(0.93);
      box-shadow: 0 2px 8px rgba(0, 180, 255, 0.3);
    }

    .send-btn:disabled {
      opacity: 0.5;
      pointer-events: none;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 12;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s ease;
      background: rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    .overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .settings-modal {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      border-top-left-radius: 28px;
      border-top-right-radius: 28px;
      padding: 24px 20px calc(24px + env(safe-area-inset-bottom, 0px));
      box-shadow: 0 -15px 50px rgba(0, 0, 0, 0.5);
      z-index: 30;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      gap: 18px;
      max-height: 85vh;
      overflow-y: auto;
      background: rgba(25, 25, 40, 0.9);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
    }

    .settings-modal.open {
      transform: translateY(0);
    }

    .settings-handle {
      width: 40px;
      height: 5px;
      background: rgba(255, 255, 255, 0.35);
      border-radius: 3px;
      align-self: center;
      margin-bottom: 8px;
    }

    .settings-title {
      font-size: 22px;
      font-weight: 700;
      text-align: center;
    }

    .settings-section {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .settings-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 4px;
    }

    .theme-options {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .theme-btn {
      padding: 14px 10px;
      border-radius: 18px;
      border: 2px solid rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.06);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 15px;
      color: #fff;
      text-align: center;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .theme-btn:active {
      transform: scale(0.94);
    }

    .theme-btn.active {
      background: linear-gradient(135deg, #00b4ff, #7b2fff);
      border-color: rgba(255, 255, 255, 0.5);
      box-shadow: 0 6px 25px rgba(0, 180, 255, 0.4);
    }

    .toggle-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
    }

    .toggle-label {
      font-size: 15px;
      font-weight: 500;
    }

    .toggle-switch {
      position: relative;
      width: 52px;
      height: 30px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(255, 255, 255, 0.2);
      transition: 0.3s;
      border-radius: 30px;
    }

    .toggle-slider:before {
      position: absolute;
      content: "";
      height: 24px;
      width: 24px;
      left: 3px;
      bottom: 3px;
      background: white;
      transition: 0.3s;
      border-radius: 50%;
    }

    input:checked + .toggle-slider {
      background: #00b4ff;
    }

    input:checked + .toggle-slider:before {
      transform: translateX(22px);
    }

    .close-settings {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 16px;
      border-radius: 16px;
      font-weight: 600;
      cursor: pointer;
      color: #fff;
      transition: all 0.2s ease;
      font-size: 16px;
      text-align: center;
      margin-top: 8px;
    }

    .close-settings:active {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(0.97);
    }

    .toast {
      position: absolute;
      top: calc(env(safe-area-inset-top, 20px) + 50px);
      left: 50%;
      transform: translateX(-50%) translateY(-120px);
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(25px);
      -webkit-backdrop-filter: blur(25px);
      color: white;
      padding: 12px 24px;
      border-radius: 25px;
      font-size: 14px;
      z-index: 50;
      transition: transform 0.35s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      pointer-events: none;
      border: 1px solid rgba(255, 255, 255, 0.15);
      white-space: nowrap;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
    }

    .search-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      color: rgba(0, 180, 255, 0.7);
      margin-bottom: 4px;
    }

    .search-indicator::before {
      content: '🌐';
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="bg-gradient" id="bgGradient"></div>
  
  <div class="phone-frame" id="phoneFrame">
    <div class="lock-screen" id="lockScreen">
      <div class="particles-container" id="particlesContainer"></div>
      <div class="lock-content">
        <div class="lock-icon" id="lockIcon">🤖</div>
        <div class="lock-title">AI Бот</div>
        <div class="lock-subtitle">Искусственный интеллект</div>
        <input type="password" class="password-input" id="passwordInput" placeholder="Введите пароль" maxlength="6" inputmode="numeric" autocomplete="off">
        <button class="unlock-btn" id="unlockBtn">Войти</button>
      </div>
    </div>

    <div class="overlay" id="settingsOverlay"></div>

    <div class="app-screen" id="appScreen">
      <div class="chat-header">
        <div class="header-left">
          <button class="icon-btn" id="lockChatBtn" aria-label="Заблокировать">🔒</button>
          <div class="chat-title">🤖 AI Бот</div>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="clearChatBtn" aria-label="Очистить чат">🗑️</button>
          <button class="icon-btn" id="settingsIcon" aria-label="Настройки">⚙️</button>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer">
        <div class="message-bubble system">🤖 AI Бот активирован</div>
        <div class="message-bubble ai">Привет! Я AI-бот с доступом к интернету. Задай мне любой вопрос, и я найду ответ! 🌐</div>
      </div>

      <div class="input-area">
        <input type="text" class="message-input" id="messageInput" placeholder="Спроси что-нибудь..." autocomplete="off" maxlength="500">
        <button class="send-btn" id="sendBtn">➤</button>
      </div>
    </div>

    <div class="settings-modal" id="settingsModal">
      <div class="settings-handle"></div>
      <div class="settings-title">⚙️ Настройки AI</div>
      
      <div class="settings-section">
        <div class="settings-label">Тема</div>
        <div class="theme-options">
          <button class="theme-btn" data-theme="light">☀️ Светлая</button>
          <button class="theme-btn active" data-theme="dark">🌙 Тёмная</button>
          <button class="theme-btn" data-theme="gold">✨ Золотая</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="toggle-container">
          <span class="toggle-label">🔍 Поиск в интернете</span>
          <label class="toggle-switch">
            <input type="checkbox" id="searchToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <div class="settings-section">
        <div class="toggle-container">
          <span class="toggle-label">🧠 Умные ответы</span>
          <label class="toggle-switch">
            <input type="checkbox" id="smartToggle" checked>
            <span class="toggle-slider"></span>
          </label>
        </div>
      </div>

      <button class="close-settings" id="closeSettingsBtn">✓ Применить</button>
    </div>

    <div class="toast" id="toast"></div>
  </div>

  <script>
    (function() {
      'use strict';

      const CORRECT_PASSWORD = '1394';
      
      const WIKIPEDIA_API = 'https://ru.wikipedia.org/w/api.php';
      const DUCKDUCKGO_API = 'https://api.duckduckgo.com/';
      
      const lockScreen = document.getElementById('lockScreen');
      const lockIcon = document.getElementById('lockIcon');
      const passwordInput = document.getElementById('passwordInput');
      const unlockBtn = document.getElementById('unlockBtn');
      const lockChatBtn = document.getElementById('lockChatBtn');
      const clearChatBtn = document.getElementById('clearChatBtn');
      const settingsIcon = document.getElementById('settingsIcon');
      const settingsModal = document.getElementById('settingsModal');
      const settingsOverlay = document.getElementById('settingsOverlay');
      const closeSettingsBtn = document.getElementById('closeSettingsBtn');
      const messageInput = document.getElementById('messageInput');
      const sendBtn = document.getElementById('sendBtn');
      const messagesContainer = document.getElementById('messagesContainer');
      const phoneFrame = document.getElementById('phoneFrame');
      const particlesContainer = document.getElementById('particlesContainer');
      const themeButtons = document.querySelectorAll('.theme-btn');
      const toast = document.getElementById('toast');
      const searchToggle = document.getElementById('searchToggle');
      const smartToggle = document.getElementById('smartToggle');

      let isLocked = true;
      let isProcessingUnlock = false;
      let isProcessingMessage = false;
      let particles = [];
      let toastTimer;
      let conversationHistory = [];

      let settings = {
        theme: 'dark',
        searchEnabled: true,
        smartEnabled: true
      };

      const knowledgeBase = {
        'привет': 'Привет! Я AI-бот. Чем могу помочь?',
        'как дела': 'У меня всё отлично! Я всегда готов помочь. А у тебя как?',
        'что ты умеешь': 'Я могу:\n• Отвечать на вопросы\n• Искать информацию в интернете\n• Объяснять сложные темы\n• Помогать с задачами\n• И просто общаться!',
        'кто ты': 'Я AI-бот с доступом к интернету. Могу искать информацию в реальном времени и поддерживать осмысленный диалог.',
        'пока': 'До встречи! Если появятся вопросы - обращайся 😊',
        'спасибо': 'Пожалуйста! Рад помочь 🙂',
      };

      function showToast(message, duration = 2000) {
        toast.textContent = message;
        toast.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(() => toast.classList.remove('show'), duration);
      }

      function createParticles() {
        const fragment = document.createDocumentFragment();
        const colors = [
          'rgba(0, 180, 255, 0.5)',
          'rgba(123, 47, 255, 0.4)',
          'rgba(0, 200, 255, 0.3)',
          'rgba(180, 100, 255, 0.35)'
        ];
        
        for (let i = 0; i < 18; i++) {
          const particle = document.createElement('div');
          particle.classList.add('particle');
          const size = 2 + Math.random() * 4;
          particle.style.width = size + 'px';
          particle.style.height = size + 'px';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.setProperty('--duration', (5 + Math.random() * 6) + 's');
          particle.style.setProperty('--delay', Math.random() * 6 + 's');
          particle.style.setProperty('--max-opacity', (0.3 + Math.random() * 0.4));
          particle.style.background = colors[Math.floor(Math.random() * colors.length)];
          fragment.appendChild(particle);
          particles.push(particle);
        }
        
        particlesContainer.appendChild(fragment);
      }

      function clearParticles() {
        particles.forEach(p => p.remove());
        particles = [];
      }

      function checkPassword() {
        if (isProcessingUnlock || !isLocked) return;
        
        if (passwordInput.value.trim() === CORRECT_PASSWORD) {
          isProcessingUnlock = true;
          unlockBtn.disabled = true;
          lockScreen.classList.add('unlocked');
          isLocked = false;
          passwordInput.value = '';
          passwordInput.classList.remove('error');
          
          setTimeout(() => {
            isProcessingUnlock = false;
            unlockBtn.disabled = false;
            messageInput.focus();
          }, 500);
        } else {
          lockIcon.classList.add('shake');
          passwordInput.classList.add('error');
          passwordInput.value = '';
          passwordInput.placeholder = 'Неверный пароль';
          setTimeout(() => {
            lockIcon.classList.remove('shake');
            passwordInput.classList.remove('error');
            passwordInput.placeholder = 'Введите пароль';
          }, 500);
        }
      }

      function lockChat() {
        if (isLocked) return;
        isLocked = true;
        lockScreen.classList.remove('unlocked');
        passwordInput.value = '';
        passwordInput.classList.remove('error');
        passwordInput.placeholder = 'Введите пароль';
        closeSettings();
        setTimeout(() => passwordInput.focus(), 300);
      }

      function clearChat() {
        const messages = messagesContainer.querySelectorAll('.message-bubble:not(.system)');
        messages.forEach(m => m.remove());
        conversationHistory = [];
        addMessage('Привет! Я AI-бот с доступом к интернету. Задай мне любой вопрос! 🌐', 'ai');
        showToast('🗑️ Чат очищен');
      }

      function addMessage(text, type = 'sent') {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message-bubble');
        if (type === 'sent') msgDiv.classList.add('sent');
        if (type === 'ai') msgDiv.classList.add('ai');
        if (type === 'system') msgDiv.classList.add('system');
        msgDiv.textContent = text;
        messagesContainer.appendChild(msgDiv);
        requestAnimationFrame(() => {
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
        return msgDiv;
      }

      function addLoadingMessage() {
        const msgDiv = document.createElement('div');
        msgDiv.classList.add('message-bubble', 'ai', 'loading');
        msgDiv.id = 'loadingMessage';
        
        const indicator = document.createElement('div');
        indicator.classList.add('typing-indicator');
        for (let i = 0; i < 3; i++) {
          const dot = document.createElement('div');
          dot.classList.add('typing-dot');
          indicator.appendChild(dot);
        }
        
        msgDiv.appendChild(indicator);
        messagesContainer.appendChild(msgDiv);
        requestAnimationFrame(() => {
          messagesContainer.scrollTop = messagesContainer.scrollHeight;
        });
        return msgDiv;
      }

      function removeLoadingMessage() {
        const loading = document.getElementById('loadingMessage');
        if (loading) loading.remove();
      }

      async function searchWikipedia(query) {
        try {
          const url = `${WIKIPEDIA_API}?action=query&list=search&srsearch=${encodeURIComponent(query)}&format=json&origin=*&srlimit=3`;
          const response = await fetch(url);
          if (!response.ok) return null;
          
          const data = await response.json();
          
          if (data.query && data.query.search && data.query.search.length > 0) {
            const results = data.query.search;
            let answer = '🔍 Вот что я нашёл:\n\n';
            
            for (let i = 0; i < Math.min(results.length, 2); i++) {
              const snippet = results[i].snippet.replace(/<\/?[^>]+(>|$)/g, '').trim();
              if (snippet.length > 10) {
                answer += `📌 ${results[i].title}\n${snippet.substring(0, 200)}...\n\n`;
              }
            }
            
            answer += `Источник: Wikipedia`;
            return answer;
          }
          return null;
        } catch (e) {
          console.warn('Wikipedia error:', e);
          return null;
        }
      }

      async function searchDuckDuckGo(query) {
        try {
          const url = `${DUCKDUCKGO_API}?q=${encodeURIComponent(query)}&format=json&no_html=1`;
          const response = await fetch(url);
          if (!response.ok) return null;
          
          const data = await response.json();
          
          if (data.AbstractText && data.AbstractText.length > 10) {
            return '🔍 ' + data.AbstractText + '\n\nИсточник: DuckDuckGo';
          }
          
          if (data.RelatedTopics && data.RelatedTopics.length > 0) {
            const topic = data.RelatedTopics[0];
            if (topic.Text && topic.Text.length > 10) {
              return '🔍 ' + topic.Text.substring(0, 300) + '\n\nИсточник: DuckDuckGo';
            }
          }
          
          return null;
        } catch (e) {
          console.warn('DuckDuckGo error:', e);
          return null;
        }
      }

      function generateSmartResponse(userMessage) {
        const msg = userMessage.toLowerCase().trim();
        
        for (const [key, value] of Object.entries(knowledgeBase)) {
          if (msg.includes(key)) return value;
        }

        if (/^\d+[\+\-\*\/]\d+$/.test(msg.replace(/\s/g, ''))) {
          try {
            const cleanExpr = msg.replace(/\s/g, '');
            const result = eval(cleanExpr);
            if (isFinite(result)) {
              return `🧮 Результат: ${result}`;
            }
          } catch(e) {}
        }

        if (msg.includes('погода') || msg.includes('погоду')) {
          return '🌤 Для точного прогноза погоды рекомендую:\n• Яндекс.Погода\n• Gismeteo\n• AccuWeather\n\nУточни город!';
        }

        if (msg.includes('время') || msg.includes('который час')) {
          const now = new Date();
          return `🕐 ${now.toLocaleTimeString('ru-RU')}\n📅 ${now.toLocaleDateString('ru-RU')}`;
        }

        if (msg.includes('новости') || msg.includes('новость')) {
          return '📰 Актуальные новости:\n• Lenta.ru\n• РБК\n• ТАСС\n\nМогу поискать конкретную тему!';
        }

        return null;
      }

      async function processMessage(userMessage) {
        if (isProcessingMessage) return;
        isProcessingMessage = true;
        sendBtn.disabled = true;

        addMessage(userMessage, 'sent');
        conversationHistory.push({ role: 'user', content: userMessage });
        addLoadingMessage();

        let response = null;

        if (settings.smartEnabled) {
          response = generateSmartResponse(userMessage);
        }

        if (!response && settings.searchEnabled) {
          response = await searchDuckDuckGo(userMessage);
          
          if (!response) {
            response = await searchWikipedia(userMessage);
          }
        }

        if (!response) {
          response = generateGeneralResponse(userMessage);
        }

        removeLoadingMessage();
        addMessage(response, 'ai');
        conversationHistory.push({ role: 'assistant', content: response });

        isProcessingMessage = false;
        sendBtn.disabled = false;
        messageInput.focus();
      }

      function generateGeneralResponse(userMessage) {
        const responses = [
          `Интересный вопрос! "${userMessage.substring(0, 50)}${userMessage.length > 50 ? '...' : ''}"\n\nМогу:\n• Поискать в интернете\n• Обсудить подробнее\n• Найти похожие темы`,
          `Я проанализировал твой вопрос. Эта тема интересная! Если нужно больше информации, просто уточни, и я поищу в интернете.`,
          `Хороший вопрос! Я могу поискать дополнительную информацию в сети. Что именно тебя интересует?`
        ];
        
        return responses[Math.floor(Math.random() * responses.length)];
      }

      function sendMessage() {
        const text = messageInput.value.trim();
        if (!text || isProcessingMessage) return;

        messageInput.value = '';
        processMessage(text);
      }

      function openSettings() {
        settingsModal.classList.add('open');
        settingsOverlay.classList.add('visible');
      }

      function closeSettings() {
        settingsModal.classList.remove('open');
        settingsOverlay.classList.remove('visible');
        settings.searchEnabled = searchToggle.checked;
        settings.smartEnabled = smartToggle.checked;
        saveSettings();
      }

      function applyTheme(theme) {
        settings.theme = theme;
        phoneFrame.className = 'phone-frame';
        if (theme === 'light') phoneFrame.classList.add('theme-light');
        else if (theme === 'gold') phoneFrame.classList.add('theme-gold');
        
        themeButtons.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.theme === theme);
        });
        
        saveSettings();
      }

      function saveSettings() {
        try {
          localStorage.setItem('aiBotSettings', JSON.stringify(settings));
        } catch (e) {}
      }

      function loadSettings() {
        try {
          const saved = localStorage.getItem('aiBotSettings');
          if (saved) {
            const parsed = JSON.parse(saved);
            settings = { ...settings, ...parsed };
            applyTheme(settings.theme);
            searchToggle.checked = settings.searchEnabled;
            smartToggle.checked = settings.smartEnabled;
          }
        } catch (e) {}
      }

      // Обработчики событий
      unlockBtn.addEventListener('click', (e) => {
        e.preventDefault();
        checkPassword();
      });

      passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          checkPassword();
        }
      });

      lockChatBtn.addEventListener('click', (e) => {
        e.preventDefault();
        lockChat();
      });

      clearChatBtn.addEventListener('click', (e) => {
        e.preventDefault();
        clearChat();
      });

      settingsIcon.addEventListener('click', (e) => {
        e.preventDefault();
        e.stopPropagation();
        openSettings();
      });

      closeSettingsBtn.addEventListener('click', (e) => {
        e.preventDefault();
        closeSettings();
      });

      settingsOverlay.addEventListener('click', (e) => {
        e.preventDefault();
        closeSettings();
      });

      settingsModal.addEventListener('click', (e) => {
        e.stopPropagation();
      });

      sendBtn.addEventListener('click', (e) => {
        e.preventDefault();
        sendMessage();
      });

      messageInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      themeButtons.forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          applyTheme(btn.dataset.theme);
        });
      });

      // Предотвращение масштабирования на iOS
      document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
      
      let lastTouchEnd = 0;
      document.addEventListener('touchend', (e) => {
        const now = Date.now();
        if (now - lastTouchEnd <= 300) e.preventDefault();
        lastTouchEnd = now;
      }, { passive: false });

      // Инициализация
      createParticles();
      loadSettings();
      passwordInput.focus();

      window.addEventListener('beforeunload', () => {
        clearParticles();
      });

    })();
  </script>
</body>
</html>
